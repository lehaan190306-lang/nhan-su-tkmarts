<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sơ đồ phân cấp nhân sự</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lexend:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-page: #f3f5fb;
    --surface: #ffffff;
    --border: #e5e8f0;
    --border-strong: #cdd3e0;
    --text-primary: #161a2b;
    --text-secondary: #5c6478;
    --text-muted: #9096a8;
    --brand: #2E5FE8;
    --brand-soft: #eaf0fe;
    --accent-teal: #0f9e86;
    --radius-lg: 18px;
    --radius-md: 13px;
    --radius-sm: 9px;
    --shadow-xs: 0 1px 2px rgba(20, 27, 51, 0.05);
    --shadow-sm: 0 2px 6px rgba(20, 27, 51, 0.07), 0 1px 2px rgba(20, 27, 51, 0.04);
    --shadow-md: 0 10px 24px rgba(20, 27, 51, 0.10), 0 2px 6px rgba(20, 27, 51, 0.05);
    --shadow-lg: 0 22px 48px rgba(20, 27, 51, 0.16);
    --ease-out: cubic-bezier(.22, 1, .36, 1);
  /* Giá trị mặc định cho các biến màu "trộn" dùng thay color-mix() (xem hàm mixWithWhite trong JS) —
     áp dụng khi thẻ chưa có màu phòng ban riêng (--card-accent chưa được đặt). */
  --card-accent-mix60: rgb(225, 229, 236);
  --card-accent-mix55: rgb(228, 231, 238);
  --card-accent-a22: rgba(205, 211, 224, 0.22);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background:
      radial-gradient(circle at 0% 0%, rgba(46, 95, 232, 0.07), transparent 45%),
      radial-gradient(circle at 100% 0%, rgba(15, 158, 134, 0.06), transparent 45%),
      var(--bg-page);
    background-attachment: fixed;
    color: var(--text-primary);
    padding: 24px 16px 60px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1360px; margin: 0 auto; }
  .org-heading { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
  .company-logo { display: none; width: 44px; height: 44px; object-fit: contain; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); box-shadow: var(--shadow-xs); }
  h1 { font-family: 'Lexend', 'Inter', sans-serif; font-size: 22px; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.01em; }
  .org-heading h1 { color: var(--text-primary); }
  .sub { font-size: 13px; color: var(--text-secondary); margin: 0 0 20px; line-height: 1.5; }
  .toolbar {
    position: sticky; top: 10px; z-index: 40;
    display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; align-items: center;
    background: rgba(255,255,255,0.72); border: 1px solid var(--border); border-radius: var(--radius-md);
    padding: 8px; backdrop-filter: blur(10px) saturate(1.4); -webkit-backdrop-filter: blur(10px) saturate(1.4);
    transition: box-shadow .2s var(--ease-out), border-color .2s var(--ease-out), background .2s var(--ease-out);
  }
  .toolbar.is-stuck { box-shadow: var(--shadow-md); border-color: var(--border-strong); background: rgba(255,255,255,0.92); }
  .toolbar-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .toolbar-divider { width: 1px; align-self: stretch; min-height: 24px; background: var(--border-strong); margin: 0 3px; flex-shrink: 0; opacity: .8; }
  .toolbar-spacer { flex: 1 1 auto; min-width: 0; }
  .toolbar button {
    height: 34px; padding: 0 14px; font-size: 13px; font-weight: 500; border-radius: var(--radius-sm);
    border: 1px solid var(--border-strong); background: var(--surface);
    color: var(--text-primary); cursor: pointer; box-shadow: var(--shadow-xs); white-space: nowrap;
    display: inline-flex; align-items: center; gap: 6px;
    transition: transform .12s var(--ease-out), box-shadow .12s var(--ease-out), background .12s var(--ease-out), border-color .12s var(--ease-out);
  }
  .toolbar button:hover { background: var(--brand-soft); border-color: #b7d3ec; color: var(--brand); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .toolbar button:active { transform: translateY(0); box-shadow: none; }
  .toolbar button.danger { color: #a32d2d; border-color: #e0b9b9; }
  .toolbar button.danger:hover { background: #fbeeee; border-color: #e0b9b9; color: #a32d2d; }
  .zoom-group {
    display: flex; align-items: center; gap: 2px; border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm); padding: 3px; background: var(--surface); box-shadow: var(--shadow-xs); flex-shrink: 0;
  }
  .zoom-group button {
    height: 28px; width: 28px; border: none; background: transparent; border-radius: 6px;
    cursor: pointer; font-size: 15px; color: var(--text-primary); padding: 0;
    transition: background .12s var(--ease-out), color .12s var(--ease-out);
    box-shadow: none;
  }
  .zoom-group button:hover { background: var(--brand-soft); color: var(--brand); transform: none; }
  .zoom-label { font-size: 12px; color: var(--text-secondary); width: 44px; text-align: center; }

  .viewport {
    overflow: auto; border: 1px solid var(--border); border-radius: var(--radius-lg);
    background: var(--surface); max-height: 78vh; padding: 32px;
    box-shadow: var(--shadow-md); cursor: grab;
  }
  .viewport.is-panning { cursor: grabbing; }
  .viewport.is-panning .card, .viewport.is-panning .team-row { cursor: grabbing; }

  .tier-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 4px; gap: 10px; }
  .tier-title { display: flex; align-items: center; gap: 9px; font-size: 14px; font-weight: 700; white-space: nowrap; letter-spacing: -0.005em; }
  .tier-bar { width: 5px; height: 16px; border-radius: 3px; display: inline-block; }
  .tier-add {
    height: 30px; padding: 0 13px; font-size: 12px; font-weight: 500; border-radius: var(--radius-sm);
    border: 1px dashed var(--border-strong); background: transparent; color: var(--text-secondary); cursor: pointer; white-space: nowrap;
    transition: background .12s var(--ease-out), border-color .12s var(--ease-out), color .12s var(--ease-out);
  }
  .tier-add:hover { background: var(--brand-soft); border-color: #b7d3ec; border-style: solid; color: var(--brand); }

  .tier-col { display: flex; flex-direction: column; flex-shrink: 0; align-self: stretch; }
  .row { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 6px 4px 16px; flex: 1; }

  .card {
    border-radius: var(--radius-md); border: 1px solid var(--border); padding: 19px 16px 16px; width: 168px;
    display: flex; flex-direction: column; align-items: center; gap: 9px; position: relative;
    background: var(--surface); flex-shrink: 0; box-shadow: var(--shadow-sm);
    transition: transform .18s var(--ease-out), box-shadow .18s var(--ease-out), border-color .18s var(--ease-out);
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 18px; right: 18px; height: 4px; border-radius: 0 0 4px 4px;
    background: linear-gradient(90deg, var(--card-accent, var(--border-strong)), var(--card-accent-mix60, var(--border-strong)));
  }
  .card:hover:not(.is-dragging) { transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: var(--card-accent, #d7dbe3); }
  /* Các vị trí điều hành cần nhiều chỗ hơn để tên dài không bị khuất. */
  .card.executive-card { width: 240px; padding: 22px 19px 18px; box-shadow: var(--shadow-md); }
  .card.executive-card:hover:not(.is-dragging) { box-shadow: var(--shadow-lg); }
  .card.executive-card .avatar { width: 72px; height: 72px; }
  .card.executive-card .name-input { height: 38px; font-size: 16px; }
  .card.executive-card .role-label { font-size: 12px; padding: 4px 12px; }
  .card .remove {
    position: absolute; top: 9px; right: 9px; width: 25px; height: 25px; border: none;
    background: transparent; color: var(--text-muted); cursor: pointer; font-size: 15px;
    line-height: 1; border-radius: 6px; opacity: 0; transition: opacity .12s var(--ease-out), background .12s var(--ease-out), color .12s var(--ease-out);
  }
  .card:hover .remove, .card:focus-within .remove { opacity: 1; }
  .card .remove:hover { background: #fbeeee; color: #a32d2d; }
  .profile-btn {
    position: absolute; top: 9px; left: 9px; width: 25px; height: 25px; border: none;
    background: transparent; color: var(--text-muted); cursor: pointer; font-size: 13px;
    line-height: 1; border-radius: 6px; padding: 0; opacity: 0; transition: opacity .12s var(--ease-out), background .12s var(--ease-out), color .12s var(--ease-out);
  }
  .card:hover .profile-btn, .card:focus-within .profile-btn { opacity: 1; }
  .profile-btn:hover { background: var(--brand-soft); color: var(--brand); }
  .flag-btn {
    display: none; align-items: center; gap: 4px; margin: -2px 0 2px; padding: 3px 9px;
    border-radius: 999px; font-size: 10.5px; font-weight: 700; white-space: nowrap;
    border: 1px solid transparent; cursor: pointer;
    transition: background .12s var(--ease-out), color .12s var(--ease-out), opacity .12s var(--ease-out);
  }
  .flag-btn .flag-icon { display: flex; }
  .flag-btn .flag-icon svg { width: 12px; height: 12px; display: block; }
  /* Tự động hiện TỰ ĐỘNG (không cần hover) khi thiếu thông tin bắt buộc và chưa xác nhận. */
  .flag-btn.is-warning {
    display: flex; color: #8a6d1f; background: #fff3cd; border-color: #f0c14b;
  }
  .flag-btn.is-warning:hover { background: #ffe9a8; }
  .flag-btn.is-warning:disabled { opacity: 1; cursor: default; color: #8a6d1f; background: #fff3cd; }
  /* Đã bấm "xác nhận hoàn thành" dù còn thiếu — chỉ hiện nhãn xám nhạt khi rê chuột vào, để không gây rối mắt. */
  .flag-btn.is-confirmed {
    display: flex; opacity: 0; color: var(--text-muted); background: #f2f3f5; border-color: var(--border);
  }
  .card:hover .flag-btn.is-confirmed, .card:focus-within .flag-btn.is-confirmed { opacity: 1; }
  .flag-btn.is-confirmed:hover { background: #e9ebf0; color: var(--text-secondary); }
  .flag-btn.is-hidden { display: none; }
  .flag-btn .flag-text { display: inline; }
  /* Thẻ được đánh dấu "cần dò lại": nổi bật màu vàng để kế toán/quản lý biết cần kiểm tra lại thông tin. */
  .card.is-flagged {
    border-color: #f0c14b;
    background: #fffaf0;
    box-shadow: 0 0 0 2px rgba(240, 193, 75, 0.45), var(--shadow-sm);
  }
  .card.is-flagged::before { background: linear-gradient(90deg, #f0c14b, #fde8b4); }
  .card.is-flagged:hover:not(.is-dragging) { box-shadow: 0 0 0 2px rgba(240, 193, 75, 0.6), var(--shadow-md); border-color: #e0ad2f; }
  .card-flag-badge {
    position: absolute; top: -8px; right: -8px; width: 20px; height: 20px; border-radius: 50%;
    background: #f7b500; color: #fff; font-size: 11px; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 5px rgba(184, 134, 11, 0.4); border: 2px solid #fff; pointer-events: none;
  }
  .avatar {
    width: 66px; height: 66px; border-radius: 50%;
    background: var(--card-accent-soft, #f2f3f5);
    border: 3px solid var(--card-accent-mix55, var(--border-strong));
    display: flex; align-items: center; justify-content: center;
    color: var(--card-accent, var(--text-muted)); overflow: hidden; cursor: pointer; flex-shrink: 0;
    box-shadow: var(--shadow-xs);
    transition: border-color .16s var(--ease-out), transform .16s var(--ease-out), box-shadow .16s var(--ease-out);
  }
  .avatar:hover { transform: scale(1.05); box-shadow: var(--shadow-sm); }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .avatar svg { width: 28px; height: 28px; }
  .name-input {
    width: 100%; height: 34px; font-size: 14.5px; font-weight: 700; text-align: center; padding: 0 6px;
    border-radius: 7px; border: 1px solid transparent; background: transparent; color: var(--text-primary);
    transition: border-color .12s var(--ease-out), background .12s var(--ease-out);
  }
  .name-input:hover { background: #f7f8fa; }
  .name-input:focus { outline: none; border-color: var(--brand); background: #fff; box-shadow: 0 0 0 3px var(--brand-soft); }
  .role-label {
    font-size: 11.5px; font-weight: 700; color: var(--card-accent, var(--text-secondary)); text-align: center;
    text-transform: uppercase; letter-spacing: 0.035em; background: var(--card-accent-soft, #f2f3f5);
    padding: 4px 11px; border-radius: 999px; box-shadow: inset 0 0 0 1px var(--card-accent-a22, transparent);
  }
  .person-title { font-size: 12px; color: var(--text-secondary); text-align: center; line-height: 1.3; min-height: 15px; }

  .connector { position: relative; width: 50px; align-self: stretch; flex-shrink: 0; }
  .static-line { height: 1px; width: 18px; background: var(--border-strong); margin: auto 0; flex-shrink: 0; }

  .add-mini {
    height: 24px; padding: 0 10px; font-size: 11px; border-radius: 7px;
    border: 1px dashed var(--border-strong); background: transparent; color: var(--text-secondary);
    cursor: pointer; margin-top: 4px; white-space: nowrap;
  }
  .add-mini:hover { background: rgba(0,0,0,0.03); }

  #org-root { display: flex; flex-direction: row; align-items: stretch; }

  /* Bố cục dọc: mỗi cấp nằm trên/dưới cấp kế tiếp, vẫn giữ nguyên dữ liệu sơ đồ. */
  #org-root.layout-vertical { flex-direction: column; align-items: stretch; min-width: max-content; }
  #org-root.layout-vertical .tier-col { flex-direction: column; align-items: stretch; min-height: 0; }
  #org-root.layout-vertical .tier-header {
    width: auto; min-width: 0; padding: 10px 4px 2px; justify-content: center;
  }
  #org-root.layout-vertical .row {
    flex-direction: row; align-items: center; justify-content: center;
    gap: 12px; padding: 8px 4px 14px; min-height: 0;
  }
  #org-root.layout-vertical .connector { width: auto; height: 50px; min-height: 50px; align-self: stretch; }
  #org-root.layout-vertical .groups-container {
    display: grid; grid-template-columns: repeat(5, minmax(0, max-content));
    justify-content: center; align-items: start; gap: 18px; padding: 8px 4px 16px;
  }
  #org-root.layout-vertical .group-block { min-width: max-content; }

  .groups-container {
    display: grid; grid-template-columns: repeat(5, minmax(0, max-content));
    justify-content: start; align-items: start; gap: 18px 20px; padding: 6px 4px 16px;
  }
  .group-block {
    display: flex; flex-direction: column; gap: 12px;
    border: 1px solid var(--border); border-left: 3px solid var(--border-strong); border-radius: var(--radius-md); padding: 16px;
    background: var(--surface); position: relative; box-shadow: var(--shadow-xs);
    transition: box-shadow .16s var(--ease-out), transform .16s var(--ease-out);
  }
  .group-block:hover { box-shadow: var(--shadow-sm); }
  .group-body { display: flex; flex-direction: row; align-items: flex-start; }
  .dept-input {
    font-size: 13px; font-weight: 700; padding: 7px 12px; border-radius: var(--radius-sm);
    border: 1px solid transparent; background: transparent; width: 240px;
    max-width: 100%; color: var(--text-primary); transition: background .12s var(--ease-out), border-color .12s var(--ease-out);
  }
  .dept-input:hover { background: #f7f8fa; }
  .dept-input:focus { outline: none; border-color: var(--brand); background: #fff; box-shadow: 0 0 0 3px var(--brand-soft); }
  .dept-input::placeholder { font-weight: 400; color: var(--text-muted); }
  .group-remove {
    position: absolute; top: -10px; right: -10px; width: 24px; height: 24px; border-radius: 50%;
    border: 1px solid var(--border-strong); background: var(--surface); color: var(--text-muted);
    cursor: pointer; font-size: 13px; line-height: 1; box-shadow: var(--shadow-xs);
    transition: color .12s var(--ease-out), border-color .12s var(--ease-out), transform .12s var(--ease-out);
  }
  .group-remove:hover { color: #a32d2d; border-color: #e0b9b9; transform: scale(1.08); }
  .group-collapse {
    position: absolute; top: -10px; right: 20px; height: 24px; padding: 0 8px; border-radius: 12px;
    border: 1px solid var(--border-strong); background: var(--surface); color: var(--text-secondary); cursor: pointer; font-size: 11px;
    box-shadow: var(--shadow-xs); transition: color .12s var(--ease-out), border-color .12s var(--ease-out);
  }
  .group-collapse:hover { color: var(--brand); border-color: #9bc4e4; }

  .group-col { display: flex; flex-direction: column; align-items: center; }
  .subgroups-col { display: flex; flex-direction: column; gap: 18px; align-items: flex-start; }
  .subgroup-block { display: flex; flex-direction: row; align-items: flex-start; }
  .subgroup-col { display: flex; flex-direction: column; align-items: center; }
  .leaves-col { display: flex; flex-direction: column; gap: 14px; align-items: flex-start; }
  .leaf-block { display: flex; flex-direction: row; align-items: center; }

  .team-table {
    display: flex; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden;
    background: #fbfbfc;
  }
  .team-col {
    display: flex; flex-direction: column; padding: 12px;
    border-right: 1px solid var(--border);
  }
  .team-col-body { display: flex; flex-direction: row; flex-wrap: wrap; gap: 12px; align-items: flex-start; }
  .team-col-chunk { display: flex; flex-direction: column; width: 214px; flex-shrink: 0; }
  .team-col:last-child { border-right: none; }
  .team-col-header {
    font-size: 12.5px; font-weight: 700; text-align: center; padding-bottom: 9px;
    margin-bottom: 9px; border-bottom: 1px solid var(--border); color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .team-row {
    display: flex; align-items: center; gap: 6px; margin-bottom: 9px; padding: 7px 7px;
    border-radius: var(--radius-sm); background: var(--surface); border: 1px solid var(--border);
    transition: box-shadow .16s var(--ease-out), border-color .16s var(--ease-out), transform .16s var(--ease-out);
  }
  .team-row:hover:not(.is-dragging) { box-shadow: var(--shadow-sm); border-color: #d7dbe3; transform: translateY(-1px); }
  .card[draggable="true"], .team-row[draggable="true"] { cursor: grab; }
  .card.is-dragging, .team-row.is-dragging { opacity: 0.42; cursor: grabbing; }
  .card.is-drop-target, .team-row.is-drop-target { outline: 2px dashed var(--brand); outline-offset: 3px; }
  .team-col-body.is-drop-target { background: var(--brand-soft); border-radius: 8px; }
  .avatar-sm {
    width: 39px; height: 39px; border-radius: 50%; background: #ffffff;
    border: 2px dashed var(--border-strong); display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); overflow: hidden; cursor: pointer; flex-shrink: 0;
    box-shadow: var(--shadow-xs);
    transition: border-color .14s var(--ease-out), transform .14s var(--ease-out);
  }
  .avatar-sm:hover { transform: scale(1.08); }
  .avatar-sm img { width: 100%; height: 100%; object-fit: cover; }
  .avatar-sm svg { width: 19px; height: 19px; }
  .team-row input {
    flex: 1; height: 33px; font-size: 14px; font-weight: 600; padding: 0 6px; border-radius: 6px;
    border: 1px solid transparent; background: transparent; min-width: 0; color: var(--text-primary);
    transition: background .12s var(--ease-out), border-color .12s var(--ease-out);
  }
  .team-row input:hover { background: #f2f3f5; }
  .team-row input:focus { outline: none; border-color: var(--brand); background: #fff; box-shadow: 0 0 0 3px var(--brand-soft); }
  .team-row button {
    width: 23px; height: 23px; border: none; background: transparent; color: var(--text-muted);
    cursor: pointer; font-size: 13px; border-radius: 6px; flex-shrink: 0;
    transition: background .12s var(--ease-out), color .12s var(--ease-out);
  }
  .team-row button:hover { background: #fbeeee; color: #a32d2d; }
  .team-row .profile-btn { position: static; width: 23px; height: 23px; flex-shrink: 0; }
  .team-row .profile-btn:hover { background: var(--brand-soft); color: var(--brand); }
  .team-row .profile-btn { opacity: 1; }
  .flag-btn-sm {
    width: 23px; height: 23px; border: none; background: transparent;
    cursor: pointer; border-radius: 6px; flex-shrink: 0;
    display: none; align-items: center; justify-content: center;
    transition: background .12s var(--ease-out), color .12s var(--ease-out), opacity .12s var(--ease-out);
  }
  .flag-btn-sm svg { width: 13px; height: 13px; display: block; }
  .flag-btn-sm.is-warning { display: flex; color: #b8860b; background: #fff3cd; opacity: 1; }
  .flag-btn-sm.is-warning:hover { background: #ffe9a8; }
  .flag-btn-sm.is-warning:disabled { opacity: 1; color: #b8860b; background: #fff3cd; }
  .flag-btn-sm.is-confirmed { display: flex; color: var(--text-muted); background: transparent; opacity: 0; }
  .team-row:hover .flag-btn-sm.is-confirmed, .team-row:focus-within .flag-btn-sm.is-confirmed { opacity: 1; }
  .flag-btn-sm.is-confirmed:hover { background: #eef0f3; color: var(--text-secondary); }
  .flag-btn-sm.is-hidden { display: none; }
  /* Hàng nhân viên/phó quản lý thiếu thông tin bắt buộc: nổi vàng TỰ ĐỘNG, không cần hover. */
  .team-row.is-flagged {
    background: #fffaf0; border-color: #f0c14b;
    box-shadow: 0 0 0 2px rgba(240, 193, 75, 0.4);
  }
  .team-row.is-flagged:hover:not(.is-dragging) { box-shadow: 0 0 0 2px rgba(240, 193, 75, 0.55); border-color: #e0ad2f; }
  .team-col .add-mini { width: 100%; margin-top: 4px; height: 30px; font-size: 12px; }

  .status { font-size: 12px; color: var(--text-muted); text-align: right; margin-top: 12px; min-height: 16px; }
  .drag-hint { font-size: 12px; color: var(--text-secondary); }
  .search-input, .filter-select { height: 34px; border: 1px solid var(--border-strong); border-radius: 8px; background: #fff; color: var(--text-primary); font-size: 13px; padding: 0 10px; }
  .search-input { width: 190px; }
  .is-filtered-out { display: none !important; }
  .profile-modal {
    position: fixed; inset: 0; z-index: 200; display: flex; align-items: center; justify-content: center;
    padding: 20px; background: rgba(26, 27, 25, 0.38); backdrop-filter: blur(2px);
    opacity: 0; visibility: hidden; pointer-events: none;
    transition: opacity .18s var(--ease-out), visibility 0s linear .18s;
  }
  .profile-modal.is-open {
    opacity: 1; visibility: visible; pointer-events: auto;
    transition: opacity .18s var(--ease-out), visibility 0s linear 0s;
  }
  .profile-dialog {
    width: min(460px, 100%); background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 16px 44px rgba(0,0,0,0.2);
    transform: translateY(10px) scale(.97); transition: transform .22s var(--ease-out);
  }
  .profile-modal.is-open .profile-dialog { transform: translateY(0) scale(1); }
  @media (prefers-reduced-motion: reduce) {
    .profile-modal, .profile-dialog { transition: none !important; }
  }
  .profile-dialog h2 { font-size: 17px; margin: 0 0 16px; }
  .profile-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
  .profile-field label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
  .profile-field input, .profile-field textarea { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font: inherit; font-size: 13px; }
  .profile-field textarea { min-height: 74px; resize: vertical; }
  .profile-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
  .profile-actions button { height: 34px; padding: 0 14px; border: 1px solid var(--border-strong); border-radius: 8px; background: #fff; cursor: pointer; }
  .profile-actions .save-profile { color: #fff; background: var(--brand); border-color: var(--brand); }
  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .settings-grid .profile-field.full-width { grid-column: 1 / -1; }
  .settings-upload-row { display: flex; align-items: center; gap: 8px; }
  .settings-upload-row button { height: 32px; padding: 0 10px; font-size: 12px; border-radius: 7px; border: 1px solid var(--border-strong); background: #fff; cursor: pointer; white-space: nowrap; }
  .settings-upload-row button:hover { background: #f0efe9; }
  .settings-preview { width: 40px; height: 40px; border-radius: 8px; object-fit: contain; border: 1px solid var(--border); background: #fff; flex-shrink: 0; display: none; }
  .settings-preview.is-visible { display: block; }
  .settings-preview.bg-preview { object-fit: cover; border-radius: 6px; }
  .profile-dialog-lg { width: min(640px, 100%); max-height: 86vh; overflow-y: auto; }

  /* Khung chỉnh sửa ảnh đại diện: kéo để di chuyển, trượt để phóng to/thu nhỏ */
  .crop-modal-dialog { width: min(420px, 100%); }
  .crop-hint { font-size: 12px; color: var(--text-secondary); text-align: center; margin: 0 0 16px; line-height: 1.5; }
  .crop-canvas-wrap {
    position: relative; width: 300px; height: 300px; margin: 0 auto 18px; border-radius: 12px;
    overflow: hidden; background: #1c1f2b; cursor: grab; touch-action: none; box-shadow: var(--shadow-sm);
  }
  .crop-canvas-wrap.is-dragging { cursor: grabbing; }
  .crop-canvas-wrap canvas { display: block; width: 100%; height: 100%; }
  .crop-frame-guide {
    position: absolute; inset: 0; pointer-events: none;
    box-shadow: 0 0 0 2000px rgba(10, 12, 20, 0.55);
    border: 2px dashed rgba(255,255,255,0.9);
  }
  .crop-frame-guide.is-circle { border-radius: 50%; }
  .crop-frame-guide.is-rounded { border-radius: 16%; }
  .crop-zoom-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .crop-zoom-row span { font-size: 15px; color: var(--text-secondary); flex-shrink: 0; }
  .crop-zoom-row input[type="range"] { flex: 1; accent-color: var(--brand); }

  /* Đầu hồ sơ: ảnh đại diện + tên + trạng thái màu */
  .profile-modal-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .profile-modal-avatar {
    width: 52px; height: 52px; border-radius: 14px; overflow: hidden; flex-shrink: 0;
    background: var(--brand-soft); display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
  }
  .profile-modal-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .profile-modal-avatar svg { width: 26px; height: 26px; color: var(--brand); }
  .profile-modal-title-wrap { min-width: 0; flex: 1; }
  .profile-modal-title-wrap h2 { margin: 0; font-size: 17px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .profile-modal-sub { font-size: 12.5px; color: var(--text-secondary); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .status-pill {
    display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 700;
    padding: 5px 12px; border-radius: 999px; white-space: nowrap; flex-shrink: 0;
  }
  .status-pill::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  .status-pill[data-status="Đang làm"] { background: #e7f8ef; color: #0f9e66; }
  .status-pill[data-status="Tạm nghỉ"] { background: #fff4e0; color: #b06a00; }
  .status-pill[data-status="Đã nghỉ việc"] { background: #fdeaea; color: #a32d2d; }
  .status-pill:not([data-status="Đang làm"]):not([data-status="Tạm nghỉ"]):not([data-status="Đã nghỉ việc"]) { background: #eef0f4; color: var(--text-muted); }

  /* Trạng thái đổi màu ngay trên ô chọn để thấy rõ không cần đọc chữ */
  .profile-field select#profile-status[data-status="Đang làm"] { border-color: #8fd9b6; background: #f3fdf8; color: #0f6e46; font-weight: 600; }
  .profile-field select#profile-status[data-status="Tạm nghỉ"] { border-color: #f3cf8f; background: #fffaf0; color: #8a5300; font-weight: 600; }
  .profile-field select#profile-status[data-status="Đã nghỉ việc"] { border-color: #eeb3b3; background: #fff5f5; color: #8a2323; font-weight: 600; }

  /* Mỗi phần trong hồ sơ là một khối riêng, có biểu tượng, dễ phân biệt hơn thay vì chỉ có gạch ngang */
  .profile-section { border: 1px solid var(--border); border-radius: var(--radius-md); padding: 14px 16px 4px; margin-bottom: 14px; background: #fbfbfe; }
  .profile-section-title {
    display: flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 700; color: var(--text-primary);
    margin: 0 0 12px; text-transform: none; letter-spacing: 0; border-top: none; padding-top: 0;
  }
  .profile-section-title .section-icon {
    width: 24px; height: 24px; border-radius: 8px; background: var(--brand-soft); color: var(--brand);
    display: inline-flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0;
  }
  .profile-section-title.is-first { margin-top: 0; }
  .profile-field select#profile-status { transition: background .15s var(--ease-out), border-color .15s var(--ease-out), color .15s var(--ease-out); }
  .profile-field select { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font: inherit; font-size: 13px; background: #fff; }
  .file-link { font-size: 12px; color: var(--brand); text-decoration: none; }
  .file-link:not([href]) { color: var(--text-muted); cursor: default; }
  .file-list { list-style: none; padding: 0; margin: 6px 0 0; display: flex; flex-direction: column; gap: 6px; }
  .file-list li { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 12px; background: #f7f8fa; padding: 6px 10px; border-radius: 8px; }
  .file-list li a { color: var(--brand); text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-list li button { border: none; background: transparent; color: var(--text-muted); cursor: pointer; font-size: 12px; flex-shrink: 0; }
  .file-list li button:hover { color: #a32d2d; }
  .file-list li.is-empty { color: var(--text-muted); background: none; padding: 0; }
  .file-remove-btn { border: none; background: transparent; color: #a32d2d; cursor: pointer; font-size: 12px; padding: 0; flex-shrink: 0; }
  .file-remove-btn:hover { text-decoration: underline; }
  .attachment-preview { display: none; margin-top: 10px; border: 1px solid var(--border); border-radius: var(--radius-md); background: #f7f8fa; padding: 10px; }
  .attachment-preview.is-visible { display: block; }
  .attachment-preview .preview-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .attachment-preview .preview-name { font-size: 12px; font-weight: 600; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .attachment-preview .preview-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .attachment-preview .preview-actions a, .attachment-preview .preview-actions button {
    font-size: 11px; padding: 3px 9px; border-radius: 6px; border: 1px solid var(--border-strong);
    background: var(--surface); color: var(--text-secondary); text-decoration: none; cursor: pointer;
  }
  .attachment-preview .preview-actions a:hover, .attachment-preview .preview-actions button:hover { color: var(--brand); border-color: #b7d3ec; }
  .attachment-preview .preview-body { max-height: 60vh; overflow: auto; text-align: center; }
  .attachment-preview .preview-body img { max-width: 100%; border-radius: 8px; }
  .attachment-preview .preview-body iframe { width: 100%; height: 55vh; border: none; border-radius: 8px; background: #fff; }
  .attachment-preview .preview-loading { font-size: 12px; color: var(--text-secondary); padding: 20px 0; }
  .upload-status { font-size: 12px; color: var(--text-secondary); min-height: 16px; margin-top: 8px; }
  .settings-range-row { display: flex; align-items: center; gap: 8px; }
  .settings-range-row input[type="range"] { flex: 1; }
  .settings-range-row .range-value { font-size: 12px; color: var(--text-secondary); width: 34px; text-align: right; }
  .settings-select { height: 34px; border-radius: 8px; border: 1px solid var(--border); padding: 0 8px; font: inherit; font-size: 13px; background: #fff; width: 100%; }
  /* Ẩn các ô chọn tệp (input file) khỏi giao diện nhưng KHÔNG dùng display:none —
     Safari trên Mac/iPhone từ chối mở hộp thoại chọn tệp (Finder) khi input đang display:none
     HOẶC khi vùng hiển thị bị thu về 0px (ví dụ dùng clip:rect), coi như "không hiển thị" tương tự
     display:none. Vì vậy chỉ ẩn bằng opacity + kích thước rất nhỏ (không dùng clip), và tắt
     pointer-events để phần tử không vô tình chặn thao tác chuột ở phía dưới nó. .click() gọi
     bằng JS vẫn hoạt động bình thường trên mọi trình duyệt. */
  input[type="file"] {
    position: absolute; width: 1px; height: 1px; opacity: 0; overflow: hidden;
    border: 0; padding: 0; pointer-events: none;
  }

  /* Màu theo phòng ban: ô chọn màu nhỏ cạnh tên bộ phận */
  .group-header-row { display: flex; align-items: center; gap: 8px; }
  .group-header-row .dept-input { flex: 1; }
  .dept-color-input { width: 34px; height: 34px; padding: 2px; border: 1px solid var(--border-strong); border-radius: 8px; background: #fff; cursor: pointer; flex-shrink: 0; }

  /* Ảnh nền tùy chỉnh phía sau sơ đồ */
  .viewport { position: relative; }
  .viewport::before {
    content: ''; position: absolute; inset: 0; border-radius: 14px; pointer-events: none; z-index: 0;
    background-image: var(--bg-image, none); background-size: cover; background-position: center;
    opacity: var(--bg-image-opacity, 0.15);
  }
  .viewport > #org-root { position: relative; z-index: 1; }

  /* Kiểu thẻ nhân sự */
  body.card-style-square .card { border-radius: 6px; }
  body.card-style-square .avatar { border-radius: 10px; }
  body.card-style-square .avatar-sm { border-radius: 8px; }
  body.card-style-compact .card { padding: 8px; gap: 5px; }
  body.card-style-compact .card.executive-card { padding: 9px; }
  body.card-style-compact .avatar { width: 40px; height: 40px; }
  body.card-style-compact .card.executive-card .avatar { width: 46px; height: 46px; }
  body.card-style-compact .person-title { display: none; }
  body.card-style-compact .role-label { font-size: 11px; }

  .lock-badge {
    display: inline-flex; align-items: center; gap: 6px; font-size: 12px; padding: 0 12px; height: 34px;
    border-radius: 8px; border: 1px solid var(--border-strong); background: var(--surface); white-space: nowrap;
  }
  .lock-badge.is-edit { color: #0F6E56; border-color: #b7ddd0; background: #f1faf6; }
  .lock-badge.is-view { color: var(--text-secondary); }
  #btn-toggle-edit { font-weight: 600; }
  #btn-toggle-edit.is-edit { color: #a32d2d; border-color: #e0b9b9; }

  /* Chế độ chỉ xem: làm mờ và khóa mọi thao tác chỉnh sửa */
  body.view-mode .card .remove,
  body.view-mode .group-remove,
  body.view-mode .tier-add,
  body.view-mode .add-mini,
  body.view-mode .team-row button:not(.profile-btn):not(.flag-btn-sm),
  body.view-mode #btn-reset,
  body.view-mode #btn-import,
  body.view-mode #btn-import-xlsx,
  body.view-mode #btn-download-image,
  body.view-mode #btn-download-pdf,
  body.view-mode #btn-export,
  body.view-mode #btn-export-xlsx {
    opacity: 0.35; pointer-events: none; cursor: not-allowed;
  }
  body.view-mode .avatar,
  body.view-mode .avatar-sm {
    cursor: default; pointer-events: none;
  }
  body.view-mode input:not(#file-input) {
    background: #fafaf8; color: var(--text-primary); cursor: default;
    opacity: 1; -webkit-text-fill-color: var(--text-primary);
  }

  /* Menu "Thêm" gộp các nút ít dùng lại cho điện thoại đỡ rối */
  .toolbar-more { display: contents; }
  .mobile-more-toggle { display: none; }
  .toolbar-search-group { display: flex; align-items: center; gap: 6px; }
  .history-list { list-style: none; margin: 0; padding: 0; max-height: 320px; overflow-y: auto; }
  .history-list li { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .history-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .history-restore-btn { flex-shrink: 0; font-size: 12px; padding: 5px 10px; border-radius: var(--radius-sm); border: 1px solid var(--brand); background: var(--brand-soft); color: var(--brand); cursor: pointer; font-weight: 600; }
  .history-restore-btn:hover { background: var(--brand); color: #fff; }
  .history-restore-btn:disabled { opacity: 0.45; cursor: not-allowed; background: var(--surface); color: var(--text-muted); border-color: var(--border-strong); }
  .history-list li:last-child { border-bottom: none; }
  .history-name { font-weight: 600; color: var(--text-primary); }
  .history-action { color: var(--text-secondary); font-size: 12.5px; }
  .history-time { color: var(--text-muted); font-size: 12px; white-space: nowrap; }
  .history-empty { font-size: 13px; color: var(--text-secondary); padding: 8px 0; }
  .share-note { font-size: 12px; color: var(--text-secondary); margin: 10px 0 0; line-height: 1.4; }

  /* ---- Toast thông báo, thay cho alert() ---- */
  .toast-container {
    position: fixed; top: 16px; right: 16px; z-index: 300;
    display: flex; flex-direction: column; gap: 10px;
    max-width: min(360px, calc(100vw - 32px));
    pointer-events: none;
  }
  .toast {
    pointer-events: auto; display: flex; align-items: flex-start; gap: 10px;
    background: #fff; border: 1px solid var(--border); border-left: 4px solid var(--border-strong);
    border-radius: var(--radius-md); box-shadow: var(--shadow-lg); padding: 12px 12px 12px 14px;
    position: relative; overflow: hidden; animation: toastIn .22s var(--ease-out) both;
  }
  .toast.is-leaving { animation: toastOut .18s ease forwards; }
  .toast-icon {
    width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 12.5px; flex-shrink: 0; margin-top: 1px;
  }
  .toast-body { flex: 1; min-width: 0; }
  .toast-message { font-size: 12.8px; line-height: 1.45; color: var(--text-primary); white-space: pre-line; word-break: break-word; }
  .toast-close { border: none; background: transparent; color: var(--text-muted); cursor: pointer; font-size: 13px; line-height: 1; padding: 2px; flex-shrink: 0; border-radius: 5px; }
  .toast-close:hover { color: var(--text-primary); background: var(--bg-page); }
  .toast-progress { position: absolute; left: 0; bottom: 0; height: 3px; background: currentColor; opacity: .3; animation-name: toastProgress; animation-timing-function: linear; animation-fill-mode: forwards; }

  .toast.type-error { border-left-color: #d64545; }
  .toast.type-error .toast-icon, .toast.type-error .toast-progress { background: #fdeaea; color: #a32d2d; }
  .toast.type-warning { border-left-color: #d98a1f; }
  .toast.type-warning .toast-icon, .toast.type-warning .toast-progress { background: #fff4e0; color: #8a5300; }
  .toast.type-success { border-left-color: #0f9e66; }
  .toast.type-success .toast-icon, .toast.type-success .toast-progress { background: #e7f8ef; color: #0f9e66; }
  .toast.type-info { border-left-color: var(--brand); }
  .toast.type-info .toast-icon, .toast.type-info .toast-progress { background: var(--brand-soft); color: var(--brand); }

  @keyframes toastIn { from { opacity: 0; transform: translateX(18px) scale(.96); } to { opacity: 1; transform: translateX(0) scale(1); } }
  @keyframes toastOut { from { opacity: 1; transform: translateX(0) scale(1); max-height: 200px; margin-top: 0; } to { opacity: 0; transform: translateX(18px) scale(.96); } }
  @keyframes toastProgress { from { width: 100%; } to { width: 0%; } }

  @media (max-width: 720px) {
    .toast-container { left: 10px; right: 10px; top: auto; bottom: 14px; max-width: none; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(14px) scale(.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes toastOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(14px) scale(.97); } }
  }
  @media (prefers-reduced-motion: reduce) {
    .toast { animation: none !important; }
    .toast.is-leaving { animation: none !important; }
    .toast-progress { animation: none !important; }
  }

  /* ---- Hiệu ứng khi thêm / xóa nhân sự ---- */
  @keyframes cardEnter {
    from { opacity: 0; transform: translateY(10px) scale(.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .card, .group-block, .team-row {
    animation: cardEnter .32s var(--ease-out) both;
  }
  .card.is-leaving, .group-block.is-leaving, .team-row.is-leaving {
    animation: none !important;
    transition: opacity .16s ease, transform .16s ease;
    opacity: 0 !important;
    transform: scale(.9) !important;
    pointer-events: none;
  }
  @media (prefers-reduced-motion: reduce) {
    .card, .group-block, .team-row { animation: none !important; }
    .card.is-leaving, .group-block.is-leaving, .team-row.is-leaving { transition: none !important; }
  }

  @keyframes toolbarDropdownIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 720px) {
    body { padding: 12px 8px 30px; }
    .org-heading { gap: 10px; margin-bottom: 2px; }
    .company-logo { width: 36px; height: 36px; }
    h1 { font-size: 18px; }
    .sub { font-size: 12px; margin-bottom: 14px; }

    .toolbar { top: 6px; gap: 6px; padding: 7px; border-radius: 12px; }
    .toolbar button, .lock-badge { min-height: 40px; font-size: 12.5px; padding: 0 11px; }
    .toolbar-divider { display: none; }
    .toolbar-spacer { display: none; }
    .zoom-hint { display: none; }

    /* Thứ tự: badge/mở khóa → nút "Thêm" → cụm zoom → hàng tìm kiếm xuống dòng riêng */
    .toolbar > .toolbar-group:last-of-type { order: 3; }
    .toolbar-search-group { order: 2; flex: 1 1 100%; width: 100%; gap: 6px; }
    .search-input { flex: 1 1 140px; width: auto; min-width: 0; }
    .filter-select { flex: 1 1 120px; min-width: 0; }

    .viewport { padding: 14px; border-radius: 12px; max-height: 68dvh; -webkit-overflow-scrolling: touch; touch-action: pan-x pan-y; }
    .card.executive-card { width: 200px; }

<script>
/* ============================================================
   CẤU HÌNH FIREBASE — điền thông tin dự án Firebase của bạn vào đây.

   BẢO MẬT CHỈNH SỬA — dùng Firebase Authentication THẬT (không chỉ
   kiểm tra ở giao diện nữa). Mật khẩu được Firebase kiểm tra ở phía
   máy chủ, và Firestore Rules chỉ cho phép ghi dữ liệu nếu đăng nhập
   đúng tài khoản này — nên không ai có thể "vượt qua" mật khẩu bằng
   cách gọi thẳng vào Firestore API nữa.

   Cách tạo/đổi mật khẩu: xem hướng dẫn trong phần chat kèm theo file này.
   Tài khoản quản trị (email) hiện tại: xem ADMIN_EMAIL bên dưới.
   ============================================================ */
const ADMIN_EMAIL = "quantri@nhansu-app.local";
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAakaR1xeMoXot21XtPzmJgXis8wledE4s",
  authDomain: "an-g-17edb.firebaseapp.com",
  projectId: "an-g-17edb",
  storageBucket: "an-g-17edb.firebasestorage.app",
  messagingSenderId: "646456987387",
  appId: "1:646456987387:web:72085269a9f3422404ea5e"
};
// Tên document lưu sơ đồ trên Firestore (có thể đổi nếu muốn tách nhiều sơ đồ khác nhau)
const DOC_PATH = { collection: 'orgcharts', doc: 'main' };

let firebaseReady = false;
let db = null;
let auth = null;
let docRef = null;
let historyColRef = null;
let filesColRef = null;
try {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.firestore();
  auth = firebase.auth();
  docRef = db.collection(DOC_PATH.collection).doc(DOC_PATH.doc);
  historyColRef = docRef.collection('history'); // lưu lịch sử ở collection con riêng, tách khỏi tài liệu chính để không vượt giới hạn 1MB khi có ảnh
  filesColRef = db.collection('nhansu_files'); // lưu tệp đính kèm hồ sơ (CCCD/hợp đồng/bằng cấp) thành từng tài liệu riêng trong Firestore, KHÔNG dùng Firebase Storage (Storage yêu cầu nâng cấp gói trả phí)
  firebaseReady = true;
} catch (err) {
  console.error('Không khởi tạo được Firebase:', err);
}

// ---- Toast thông báo (thay cho alert() để không chặn thao tác) ----
const toastContainer = document.createElement('div');
toastContainer.className = 'toast-container';
document.body.appendChild(toastContainer);
const TOAST_ICONS = { error: '✕', warning: '⚠', success: '✓', info: 'ℹ' };
const TOAST_DURATIONS = { error: 7000, warning: 6000, success: 4000, info: 4500 };
function showToast(message, type = 'info', duration) {
  const dur = duration === undefined ? (TOAST_DURATIONS[type] || 5000) : duration;
  const toast = document.createElement('div');
  toast.className = 'toast type-' + type;
  toast.setAttribute('role', type === 'error' || type === 'warning' ? 'alert' : 'status');
  toast.innerHTML =
    '<span class="toast-icon">' + (TOAST_ICONS[type] || 'ℹ') + '</span>' +
    '<div class="toast-body"><div class="toast-message"></div></div>' +
    '<button type="button" class="toast-close" aria-label="Đóng thông báo">✕</button>' +
    (dur ? '<span class="toast-progress" style="animation-duration:' + dur + 'ms;"></span>' : '');
  toast.querySelector('.toast-message').textContent = message;
  let timer = null;
  const removeToast = () => {
    if (!toast.isConnected) return;
    toast.classList.add('is-leaving');
    setTimeout(() => toast.remove(), 190);
  };
  toast.querySelector('.toast-close').onclick = removeToast;
  toastContainer.appendChild(toast);
  if (dur) timer = setTimeout(removeToast, dur);
  return toast;
}

// Giới hạn dung lượng gốc cho tệp KHÔNG PHẢI ảnh (ví dụ PDF), vì không nén được như ảnh.
// Firestore giới hạn ~1MB/tài liệu, mã hóa base64 làm tệp phình to hơn ~37%, nên đặt ngưỡng an toàn thấp hơn nhiều.
const MAX_RAW_FILE_BYTES = 650 * 1024; // ~650KB

function fileToDataUrlRaw(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error('Không đọc được tệp.'));
    reader.readAsDataURL(file);
  });
}

// Lưu một tệp (ảnh/PDF) đính kèm hồ sơ nhân sự thành MỘT TÀI LIỆU RIÊNG trong Firestore
// (collection "nhansu_files"), tách khỏi tài liệu sơ đồ chính để không làm phình tài liệu chính.
// Ảnh sẽ được tự động nén nhỏ lại; PDF thì giữ nguyên nhưng bị giới hạn dung lượng.
async function uploadPersonFile(file, personId, kind) {
  if (!firebaseReady || !filesColRef) throw new Error('Chưa kết nối được Firebase.');
  let dataUrl;
  if (file.type.startsWith('image/')) {
    dataUrl = await compressImageFile(file, 1400, 'image/jpeg', 0.75);
  } else {
    if (file.size > MAX_RAW_FILE_BYTES) {
      throw new Error('Tệp quá lớn (giới hạn khoảng ' + Math.round(MAX_RAW_FILE_BYTES / 1024) + 'KB cho tệp PDF/không phải ảnh). Hãy nén tệp nhỏ lại hoặc chụp ảnh thay vì tải nguyên văn bản PDF.');
    }
    dataUrl = await fileToDataUrlRaw(file);
  }
  const added = await filesColRef.add({
    personId, kind, name: file.name, mimeType: file.type || 'application/octet-stream',
    dataUrl, createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  return { id: added.id, name: file.name };
}

// Hiển thị một tệp đã lưu ở Firestore (theo id tài liệu) NGAY TRONG khung xem trước của hồ sơ,
// không mở tab mới. Ảnh hiện trực tiếp; PDF hiện qua khung nhúng; các loại khác cho tải xuống.
async function openPersonFile(fileId) {
  if (!fileId) return;
  const box = profileModal.querySelector('#attachment-preview');
  if (!box) return;
  box.classList.add('is-visible');
  box.innerHTML = '<div class="preview-loading">Đang tải tệp...</div>';
  if (!firebaseReady || !filesColRef) { box.innerHTML = '<div class="preview-loading">Chưa kết nối được Firebase.</div>'; return; }
  try {
    const snap = await filesColRef.doc(fileId).get();
    if (!snap.exists) { box.innerHTML = '<div class="preview-loading">Không tìm thấy tệp này (có thể đã bị xóa).</div>'; return; }
    const data = snap.data();
    const res = await fetch(data.dataUrl);
    const blob = await res.blob();
    const blobUrl = URL.createObjectURL(blob);
    const mime = data.mimeType || '';
    let bodyHtml;
    if (mime.startsWith('image/')) {
      bodyHtml = '<img src="' + blobUrl + '" alt="' + (data.name || '') + '">';
    } else if (mime === 'application/pdf') {
      bodyHtml = '<iframe src="' + blobUrl + '"></iframe>';
    } else {
      bodyHtml = '<div class="preview-loading">Không xem trước được loại tệp này. Bấm "Tải xuống" để mở.</div>';
    }
    box.innerHTML =
      '<div class="preview-head">' +
        '<span class="preview-name">📎 ' + (data.name || 'Tệp đính kèm') + '</span>' +
        '<span class="preview-actions"><a download="' + (data.name || 'tep') + '" href="' + blobUrl + '">Tải xuống</a><button type="button" class="preview-close">✕ Đóng</button></span>' +
      '</div>' +
      '<div class="preview-body">' + bodyHtml + '</div>';
    box.querySelector('.preview-close').onclick = () => {
      box.classList.remove('is-visible');
      box.innerHTML = '';
      URL.revokeObjectURL(blobUrl);
    };
  } catch (err) {
    box.innerHTML = '<div class="preview-loading">Lỗi khi mở tệp: ' + err.message + '</div>';
  }
}

const T1 = { id: 't1', title: 'Chủ tịch', accent: '#534AB7' };
const T2 = { id: 't2', title: 'Giám đốc', accent: '#185FA5' };
const T2B = { id: 't2b', title: 'Phó Giám đốc', accent: '#2E8B8B' };
const T3 = { id: 't3', title: 'Tổng quản lý', accent: '#0F6E56' };
const T4 = { id: 't4', title: 'Quản lý trung cấp', accent: '#0F6E56' };
const TEAM_COLS = [
  { key: 't6', title: 'Phó quản lý' },
  { key: 't7', title: 'Nhân viên' }
];
const FLAT_TIERS_TOP = [T1, T2, T2B, T3];

const STORAGE_KEY = 'org-chart-data-v6-cache'; // chỉ dùng làm bộ nhớ đệm hiển thị tạm thời khi đang tải từ đám mây
const LAYOUT_STORAGE_KEY = 'org-chart-layout-orientation-v1';
let state = null;
let pendingAvatarTarget = null;
let zoomLevel = 1;
let layoutOrientation = localStorage.getItem(LAYOUT_STORAGE_KEY) === 'vertical' ? 'vertical' : 'horizontal';
let dragPayload = null;
let searchQuery = '';
let roleFilter = 'all';


// ---- Phân quyền chỉnh sửa bằng mật khẩu ----
let editMode = false;
let applyingRemoteUpdate = false; // tránh render đè lên trong lúc đang gõ khi có cập nhật từ người khác
let saveTimer = null;
const EDITOR_NAME_KEY = 'org-chart-editor-name-v1';
let currentEditorName = localStorage.getItem(EDITOR_NAME_KEY) || '';
let editHistory = []; // { name, at } — danh sách chỉnh sửa gần nhất, đồng bộ từ đám mây

function ensureEditorName() {
  if (currentEditorName && currentEditorName.trim()) return currentEditorName;
  const name = prompt('Nhập tên của bạn để lưu vào lịch sử chỉnh sửa (VD: Chị Hoa - Kế toán):', '');
  currentEditorName = (name || '').trim() || 'Ẩn danh';
  try { localStorage.setItem(EDITOR_NAME_KEY, currentEditorName); } catch (err) {}
  return currentEditorName;
}

async function sha256Hex(text) {
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function updateLockUI() {
  const badge = document.getElementById('lock-badge');
  const btn = document.getElementById('btn-toggle-edit');
  const renameBtn = document.getElementById('btn-rename-editor');
  document.body.classList.toggle('view-mode', !editMode);
  if (editMode) {
    badge.textContent = '🔓 Đang chỉnh sửa' + (currentEditorName ? ' · ' + currentEditorName : '');
    badge.className = 'lock-badge is-edit';
    btn.textContent = '🔒 Khóa lại';
    btn.classList.add('is-edit');
    renameBtn.style.display = '';
  } else {
    badge.textContent = '🔒 Đang xem';
    badge.className = 'lock-badge is-view';
    btn.textContent = '🔓 Mở khóa chỉnh sửa';
    btn.classList.remove('is-edit');
    renameBtn.style.display = 'none';
  }
  lockFieldsIfNeeded(); // bật/tắt lại toàn bộ ô nhập liệu và nút theo trạng thái mới nhất
}

function genPersonId() {
  return 'p_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 9);
}

function ensurePersonProfile(person) {
  ['title', 'phone', 'email', 'note', 'gender', 'dob', 'address', 'joinDate', 'status',
   'cccd', 'bhxh', 'salary', 'bank', 'cccdFileId', 'contractFileId'].forEach((key) => {
    if (typeof person[key] !== 'string') person[key] = '';
  });
  if (!person.status) person.status = 'Đang làm';
  if (typeof person.confirmedComplete !== 'boolean') person.confirmedComplete = false;
  if (!Array.isArray(person.degreeFiles)) person.degreeFiles = [];
  // Mỗi người cần một ID cố định để tra cứu lại đúng người đó sau này (ví dụ khi
  // đang mở hộp thoại chọn ảnh mà dữ liệu vừa được đồng bộ mới từ đám mây về —
  // nếu chỉ giữ tham chiếu object cũ thì ảnh sẽ bị gán "lạc" vào dữ liệu cũ đã bị thay thế).
  if (typeof person.id !== 'string' || !person.id) person.id = genPersonId();
  return person;
}

// Các trường bắt buộc để coi là "đủ thông tin" (theo yêu cầu: Tên, SĐT, CCCD, Lương, Ngân hàng —
// đầy đủ hồ sơ kế toán cần để làm lương/giấy tờ).
const REQUIRED_INFO_FIELDS = ['name', 'phone', 'cccd', 'salary', 'bank'];
function isPersonInfoIncomplete(person) {
  return REQUIRED_INFO_FIELDS.some((key) => {
    const v = person[key];
    return !v || !String(v).trim();
  });
}
// Có cần hiện cảnh báo vàng hay không: thiếu thông tin bắt buộc VÀ chưa được xác nhận
// hoàn thành thủ công (nút "Đã xác nhận đủ" cho phép bỏ qua cảnh báo dù còn thiếu trường nào đó).
function needsInfoReview(person) {
  return isPersonInfoIncomplete(person) && !person.confirmedComplete;
}

// Tìm đúng người (theo id) trong dữ liệu HIỆN TẠI (mới nhất) — dùng thay cho việc giữ
// tham chiếu object trực tiếp, vì object có thể đã bị thay thế bởi dữ liệu đồng bộ mới.
function findPersonById(id) {
  if (!id || !state) return null;
  for (const tier of FLAT_TIERS_TOP) {
    const found = (state[tier.id] || []).find((p) => p.id === id);
    if (found) return found;
  }
  for (const manager of state.t4 || []) {
    if (manager.id === id) return manager;
    for (const col of TEAM_COLS) {
      const found = (manager.team && manager.team[col.key] || []).find((p) => p.id === id);
      if (found) return found;
    }
  }
  return null;
}

function personSearchText(person, extra = '') {
  ensurePersonProfile(person);
  return [person.name, person.title, person.phone, person.email, person.note, person.cccd, person.address, extra].join(' ').toLocaleLowerCase('vi-VN');
}

function applySearchFilter() {
  const root = document.getElementById('org-root');
  const query = searchQuery.trim().toLocaleLowerCase('vi-VN');
  root.querySelectorAll('[data-person-search]').forEach((el) => {
    const textMatches = !query || el.dataset.personSearch.includes(query);
    const roleMatches = roleFilter === 'all' || el.dataset.personGroup === roleFilter;
    el.classList.toggle('is-filtered-out', !(textMatches && roleMatches));
  });
  root.querySelectorAll('.group-block').forEach((group) => {
    const people = Array.from(group.querySelectorAll('[data-person-search]'));
    group.classList.toggle('is-filtered-out', people.length > 0 && people.every((person) => person.classList.contains('is-filtered-out')));
  });
}

function setProfileUploadStatus(msg) {
  profileModal.querySelector('#profile-upload-status').textContent = msg || '';
}

function updateFileLink(linkEl, fileId) {
  linkEl.removeAttribute('href');
  if (fileId) {
    linkEl.textContent = '📎 Xem tệp đã tải lên';
    linkEl.onclick = (e) => { e.preventDefault(); openPersonFile(fileId); };
  } else {
    linkEl.textContent = 'Chưa có tệp';
    linkEl.onclick = null;
  }
  const removeBtn = linkEl.parentElement.querySelector('.file-remove-btn');
  if (removeBtn) removeBtn.style.display = (fileId && editMode) ? 'inline-block' : 'none';
}

// Xóa hẳn một tệp: gỡ tham chiếu khỏi hồ sơ và xóa luôn tài liệu tương ứng trong Firestore
// (để không lưu mãi thông tin nhạy cảm như CCCD của người đã bị gỡ tệp).
async function deletePersonFile(fileId) {
  if (fileId && firebaseReady && filesColRef) {
    try { await filesColRef.doc(fileId).delete(); } catch (err) { console.error('Không xóa được tệp trên Firestore:', err); }
  }
}

function renderDegreeList() {
  const list = profileModal.querySelector('#degree-file-list');
  list.innerHTML = '';
  const files = profileTarget ? (profileTarget.degreeFiles || []) : [];
  if (!files.length) {
    list.innerHTML = '<li class="is-empty">Chưa có tệp nào</li>';
    return;
  }
  files.forEach((f, idx) => {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = '#'; a.textContent = '📎 ' + (f.name || ('Tệp ' + (idx + 1)));
    a.onclick = (e) => { e.preventDefault(); openPersonFile(f.id); };
    li.appendChild(a);
    if (editMode) {
      const rm = document.createElement('button');
      rm.type = 'button'; rm.textContent = '✕ Xóa'; rm.title = 'Bỏ tệp này khỏi hồ sơ';
      rm.onclick = () => {
        if (!confirm('Xóa tệp "' + (f.name || '') + '" khỏi hồ sơ?')) return;
        deletePersonFile(f.id);
        profileTarget.degreeFiles.splice(idx, 1);
        renderDegreeList();
        setProfileUploadStatus('Đã xóa tệp. Nhớ bấm "Lưu hồ sơ" để lưu lại.');
      };
      li.appendChild(rm);
    }
    list.appendChild(li);
  });
}

fileInputDegree.onchange = async (e) => {
  const files = Array.from(e.target.files || []); e.target.value = '';
  if (!files.length || !profileTarget) return;
  setProfileUploadStatus('Đang lưu ' + files.length + ' tệp...');
  for (const file of files) {
    try {
      const { id, name } = await uploadPersonFile(file, profileTarget.id, 'bangcap');
      profileTarget.degreeFiles.push({ id, name });
    } catch (err) {
      setProfileUploadStatus('Lỗi lưu tệp "' + file.name + '": ' + err.message);
      return;
    }
  }
  renderDegreeList();
  setProfileUploadStatus('Đã lưu xong. Nhớ bấm "Lưu hồ sơ" để lưu lại.');

async function openProfile(person) {
  if (!editMode) {
    const pass = prompt('Sơ đồ này giới hạn xem chi tiết hồ sơ. Nhập mật khẩu để xem và chỉnh sửa:');
    if (pass === null || pass === '') return;
    const ok = await checkEditPassword(pass);
    if (!ok) { showToast('Sai mật khẩu.', 'error'); return; }
    activateEditMode('profile');
  }
  profileTarget = ensurePersonProfile(person);
  profileModal.querySelector('#profile-heading').textContent = person.name || 'Hồ sơ nhân sự';
  profileModal.querySelector('#profile-modal-sub').textContent = profileTarget.title || 'Chưa cập nhật chức danh';
  profileModal.querySelector('#profile-modal-avatar').innerHTML = person.photo ? '<img src="' + person.photo + '" alt="Ảnh đại diện">' : userIcon();
  profileModal.querySelector('#profile-title').value = profileTarget.title;
  profileModal.querySelector('#profile-gender').value = profileTarget.gender || '';
  profileModal.querySelector('#profile-dob').value = profileTarget.dob || '';
  profileModal.querySelector('#profile-phone').value = profileTarget.phone;
  profileModal.querySelector('#profile-email').value = profileTarget.email;
  profileModal.querySelector('#profile-address').value = profileTarget.address || '';
  profileModal.querySelector('#profile-join-date').value = profileTarget.joinDate || '';
  profileModal.querySelector('#profile-status').value = profileTarget.status || 'Đang làm';
  updateProfileStatusVisual(profileTarget.status || 'Đang làm');
  profileModal.querySelector('#profile-cccd').value = profileTarget.cccd || '';
  profileModal.querySelector('#profile-bhxh').value = profileTarget.bhxh || '';
  profileModal.querySelector('#profile-salary').value = profileTarget.salary || '';
  profileModal.querySelector('#profile-bank').value = profileTarget.bank || '';
  profileModal.querySelector('#profile-note').value = profileTarget.note;
  updateFileLink(profileModal.querySelector('#link-cccd'), profileTarget.cccdFileId);
  updateFileLink(profileModal.querySelector('#link-contract'), profileTarget.contractFileId);
  renderDegreeList();
  const previewBox = profileModal.querySelector('#attachment-preview');
  previewBox.classList.remove('is-visible');
  previewBox.innerHTML = '';
  setProfileUploadStatus('');
  profileModal.querySelectorAll('input, textarea, select').forEach((field) => { field.disabled = !editMode; });
  profileModal.querySelectorAll('.settings-upload-row button').forEach((btn) => { btn.style.display = editMode ? '' : 'none'; });
  profileModal.querySelector('.save-profile').style.display = editMode ? '' : 'none';
  profileModal.classList.add('is-open');
}

// Tệp ảnh tạm cho logo/ảnh nền khi người dùng chọn "Tải ảnh lên" (chỉ ghi vào state khi bấm Lưu)
let pendingLogoDataUrl = null;
let pendingBgDataUrl = null;

function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// Thu nhỏ & nén ảnh trước khi lưu (tránh ảnh gốc từ điện thoại quá nặng làm vượt giới hạn lưu trữ)
// maxDim: kích thước cạnh dài nhất tối đa (px). mimeType/quality: định dạng và chất lượng nén xuất ra.
function compressImageFile(file, maxDim, mimeType, quality) {
  return new Promise((resolve, reject) => {
    fileToDataURL(file).then((dataUrl) => {
      const img = new Image();
      img.onerror = () => reject(new Error('Không đọc được ảnh.'));
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        try {
          resolve(canvas.toDataURL(mimeType, quality));
        } catch (err) {
          reject(err);
        }
      };
      img.src = dataUrl;
    }).catch(reject);
  });
}
function updateSettingsPreview(imgEl, src) {
  if (src) { imgEl.src = src; imgEl.classList.add('is-visible'); }
  else { imgEl.src = ''; imgEl.classList.remove('is-visible'); }
}

function hexToRgba(hex, alpha) {
  const h = hex.replace('#', '');
  const full = h.length === 3 ? h.split('').map((c) => c + c).join('') : h;
  const bigint = parseInt(full, 16);
  const r = (bigint >> 16) & 255;
  const g = (bigint >> 8) & 255;
  const b = bigint & 255;
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}
// Trộn một màu hex với trắng theo tỉ lệ phần trăm (percent% màu gốc + phần còn lại là trắng).
// Dùng để thay cho CSS color-mix(), vì html2canvas (thư viện xuất ảnh PNG/PDF) không hiểu color-mix()
// và sẽ báo lỗi "Attempting to parse an unsupported color function" khi xuất ảnh/PDF.
function mixWithWhite(hex, percent) {
  const h = hex.replace('#', '');
  const full = h.length === 3 ? h.split('').map((c) => c + c).join('') : h;
  const bigint = parseInt(full, 16);
  const r = (bigint >> 16) & 255, g = (bigint >> 8) & 255, b = bigint & 255;
  const p = percent / 100;
  const mr = Math.round(r * p + 255 * (1 - p));
  const mg = Math.round(g * p + 255 * (1 - p));
  const mb = Math.round(b * p + 255 * (1 - p));
  return 'rgb(' + mr + ',' + mg + ',' + mb + ')';
}

function loadState() {
  // Hiển thị tạm bằng bản nhớ đệm cục bộ (nếu có) trong lúc chờ tải từ đám mây, cho cảm giác mượt hơn
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { state = JSON.parse(raw); render(); }
  } catch (err) { /* bỏ qua, sẽ chờ dữ liệu từ đám mây */ }

  if (!state) { state = defaultState(); render(); }

  if (!firebaseReady) {
    setStatus('⚠️ Chưa kết nối được đám mây — đang chạy chế độ lưu tạm trên máy này. Xem console (F12) để biết chi tiết lỗi.');
    return;
  }

  setStatus('Đang kết nối đám mây...');

  // Lắng nghe realtime: mọi thay đổi (kể cả từ người khác) sẽ tự cập nhật lên đây
  docRef.onSnapshot((snap) => {
    if (snap.metadata.hasPendingWrites) return; // bỏ qua tiếng vọng của chính lần ghi của mình
    if (!snap.exists) {
      // Chưa có dữ liệu trên đám mây -> khởi tạo bằng dữ liệu mặc định
      docRef.set({ state: defaultState(), updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      return;
    }
    const data = snap.data();
    state = data.state || defaultState();
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
    render();
    setStatus('Đã đồng bộ với đám mây · ' + new Date().toLocaleTimeString('vi-VN'));
  }, (err) => {
    setStatus('Không kết nối được đám mây: ' + err.message);
  });
}

function saveState(options = {}) {
  if (!editMode) return; // người chỉ xem không được ghi lên đám mây
  const actionLabel = options.action || 'Cập nhật sơ đồ';

  if (!firebaseReady) {
    // Chế độ dự phòng: chỉ lưu trên máy này, giống bản gốc chưa nối đám mây
    try {
      const entry = { name: currentEditorName || 'Ẩn danh', at: new Date().toISOString(), state: state, action: actionLabel };
      editHistory = [entry, ...(Array.isArray(editHistory) ? editHistory : [])].slice(0, 20);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      setStatus('⚠️ Đã lưu tạm trên máy này (chưa có đám mây để đồng bộ cho người khác).');
    } catch (err) {
      setStatus('Không lưu được: ' + err.message);
      showToast('Không lưu được trên máy này (có thể do ảnh vừa chọn quá lớn). Hãy thử chọn ảnh khác hoặc dung lượng nhỏ hơn.', 'error');
    }
    return;
  }

  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      // Tài liệu chính chỉ chứa dữ liệu sơ đồ hiện tại — gọn nhẹ, không kèm lịch sử để tránh vượt giới hạn dung lượng
      await docRef.set({ state, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
      setStatus('Đã lưu lên đám mây · ' + new Date().toLocaleTimeString('vi-VN'));

      // Ghi một dòng lịch sử riêng (không ảnh hưởng tới việc lưu dữ liệu chính ở trên dù có lỗi)
      try {
        await historyColRef.add({
          name: currentEditorName || 'Ẩn danh',
          at: new Date().toISOString(),
          action: actionLabel,
          state: state,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        pruneOldHistory();
      } catch (histErr) {
        console.error('Không ghi được lịch sử (dữ liệu chính vẫn đã lưu an toàn):', histErr);
      }
    } catch (err) {
      setStatus('Không lưu được lên đám mây: ' + err.message);
      const sizeIssue = /longer than|exceeds|too large|invalid-argument|resource-exhausted/i.test(err.message || '');
      showToast(
        'Không lưu được lên đám mây.\nLý do: ' + err.message +
        (sizeIssue ? '\nCó thể ảnh bạn vừa tải lên quá lớn. Hãy thử chọn ảnh khác hoặc ảnh có dung lượng nhỏ hơn.' : ''),
        'error'
      );
    }
  }, 300);
}

// Xóa bớt các dòng lịch sử cũ, chỉ giữ lại 20 dòng gần nhất để collection không phình to mãi
async function pruneOldHistory() {
  try {
    const snap = await historyColRef.orderBy('at', 'desc').get();
    const docs = snap.docs;
    if (docs.length <= 20) return;
    const toDelete = docs.slice(20);
    await Promise.all(toDelete.map((d) => d.ref.delete()));
  } catch (err) {
    console.error('Không dọn được lịch sử cũ:', err);
  }
}

// Phát hiệu ứng "biến mất" cho một thẻ/khối trước khi thật sự xóa khỏi dữ liệu.
// Giúp việc xóa nhân sự trông mượt mà thay vì biến mất đột ngột.
function removeWithAnimation(el, applyStateChange) {
  const prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (!el || prefersReduced) { applyStateChange(); return; }
  let done = false;
  const finish = () => { if (done) return; done = true; applyStateChange(); };
  el.classList.add('is-leaving');
  el.addEventListener('transitionend', finish, { once: true });
  setTimeout(finish, 200); // dự phòng nếu transitionend không bắn ra (VD phần tử bị ẩn)
}

function createCard(person, tierTitle, onRemove, onPhoto, accentColor) {
  ensurePersonProfile(person);
  const card = document.createElement('div');
  card.className = 'card';
  if (tierTitle !== T4.title) card.classList.add('executive-card');
  card.dataset.personSearch = personSearchText(person, tierTitle);
  card.dataset.personGroup = tierTitle === T4.title ? 'manager' : 'executive';

  const flagBtn = document.createElement('button');
  flagBtn.type = 'button';
  flagBtn.setAttribute('aria-label', 'Trạng thái thông tin hồ sơ');
  function refreshFlagState() {
    const incomplete = isPersonInfoIncomplete(person);
    if (!incomplete && person.confirmedComplete) person.confirmedComplete = false; // đã đủ TT nên không cần cờ xác nhận nữa
    const needsReview = incomplete && !person.confirmedComplete;
    const confirmedIncomplete = incomplete && person.confirmedComplete;
    card.classList.toggle('is-flagged', needsReview);
    if (needsReview) {
      flagBtn.className = 'flag-btn is-warning';
      flagBtn.innerHTML = '<span class="flag-icon">' + warnIcon() + '</span><span class="flag-text">Thiếu thông tin</span>';
      flagBtn.title = 'Thiếu Tên/SĐT/CCCD/Lương/Ngân hàng. Bấm để xác nhận đã hoàn thành (bỏ qua cảnh báo).';
    } else if (confirmedIncomplete) {
      flagBtn.className = 'flag-btn is-confirmed';
      flagBtn.innerHTML = '<span class="flag-icon">' + checkIcon() + '</span><span class="flag-text">Đã xác nhận</span>';
      flagBtn.title = 'Vẫn còn thiếu thông tin nhưng đã được xác nhận hoàn thành. Bấm để hiện lại cảnh báo.';
    } else {
      flagBtn.className = 'flag-btn is-hidden';
      flagBtn.innerHTML = '';
      flagBtn.title = '';
    }
  }
  refreshFlagState();
  flagBtn.onclick = (event) => {
    event.stopPropagation();
    person.confirmedComplete = !person.confirmedComplete;
    refreshFlagState();
    saveState({ action: (person.confirmedComplete ? 'Xác nhận hoàn thành hồ sơ: ' : 'Bỏ xác nhận, cần dò lại: ') + (person.name || '(trống)') });
  };

  const removeBtn = document.createElement('button');
  removeBtn.className = 'remove';
  removeBtn.setAttribute('aria-label', 'Xóa vị trí này');
  removeBtn.textContent = '✕';
  removeBtn.onclick = onRemove;

  const profileBtn = document.createElement('button');
  profileBtn.className = 'profile-btn';
  profileBtn.type = 'button';
  profileBtn.title = 'Xem hồ sơ';
  profileBtn.setAttribute('aria-label', 'Xem hồ sơ');
  profileBtn.textContent = 'i';
  profileBtn.onclick = (event) => { event.stopPropagation(); openProfile(person); };

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.title = 'Bấm để chọn ảnh';
  avatar.innerHTML = person.photo ? '<img src="' + person.photo + '" alt="Ảnh đại diện">' : userIcon();
  avatar.onclick = onPhoto;
  if (accentColor) {
    avatar.style.borderStyle = 'solid';
    avatar.style.borderColor = accentColor;
    avatar.style.color = accentColor;
    avatar.style.background = hexToRgba(accentColor, 0.12);
    card.style.setProperty('--card-accent', accentColor);
    card.style.setProperty('--card-accent-soft', hexToRgba(accentColor, 0.12));
    card.style.setProperty('--card-accent-mix60', mixWithWhite(accentColor, 60));
    card.style.setProperty('--card-accent-mix55', mixWithWhite(accentColor, 55));
    card.style.setProperty('--card-accent-a22', hexToRgba(accentColor, 0.22));
  }

  const nameInput = document.createElement('input');
  nameInput.className = 'name-input';
  nameInput.type = 'text';
  nameInput.placeholder = 'Nhập tên';
  nameInput.value = person.name;
  nameInput.oninput = (e) => { person.name = e.target.value; };
  nameInput.onblur = () => saveState({ action: 'Sửa tên: ' + (person.name || '(trống)') });

  const roleLabel = document.createElement('div');
  roleLabel.className = 'role-label';
  roleLabel.textContent = tierTitle;

  const titleLabel = document.createElement('div');
  titleLabel.className = 'person-title';
  titleLabel.textContent = person.title || '';

  card.appendChild(profileBtn);
  card.appendChild(flagBtn);
  card.appendChild(removeBtn);
  card.appendChild(avatar);
  card.appendChild(nameInput);
  card.appendChild(titleLabel);
  card.appendChild(roleLabel);
  return card;
}

function startDrag(event, payload, el) {
  if (!editMode) { event.preventDefault(); return; }
  dragPayload = payload;
  event.dataTransfer.effectAllowed = 'move';
  event.dataTransfer.setData('text/plain', payload.kind);
  el.classList.add('is-dragging');
}

function finishDrag(el) {
  dragPayload = null;
  document.querySelectorAll('.is-drop-target').forEach(target => target.classList.remove('is-drop-target'));
  el.classList.remove('is-dragging');
}

function makeFlatCardDraggable(card, tierId, index) {
  card.draggable = true;
  card.addEventListener('dragstart', (event) => startDrag(event, { kind: 'flat', tierId, index }, card));
  card.addEventListener('dragend', () => finishDrag(card));
  card.addEventListener('dragover', (event) => {
    if (editMode && dragPayload?.kind === 'flat' && dragPayload.tierId === tierId) {
      event.preventDefault();
      card.classList.add('is-drop-target');
    }
  });
  card.addEventListener('dragleave', () => card.classList.remove('is-drop-target'));
  card.addEventListener('drop', (event) => {
    event.preventDefault();
    card.classList.remove('is-drop-target');
    if (!dragPayload || dragPayload.kind !== 'flat' || dragPayload.tierId !== tierId || dragPayload.index === index) return;
    const list = state[tierId];
    const [person] = list.splice(dragPayload.index, 1);
    list.splice(dragPayload.index < index ? index - 1 : index, 0, person);
    render();
    saveState({ action: 'Sắp xếp lại thứ tự nhân sự (kéo thả)' });
  });
}

function makeTeamRowDraggable(row, managerIndex, teamKey, index) {
  row.draggable = true;
  row.addEventListener('dragstart', (event) => startDrag(event, { kind: 'team', managerIndex, teamKey, index }, row));
  row.addEventListener('dragend', () => finishDrag(row));
}

function moveTeamPerson(targetTeam, targetKey, targetIndex) {
  if (!dragPayload || dragPayload.kind !== 'team') return;
  const sourceManager = state.t4[dragPayload.managerIndex];
  if (!sourceManager || !sourceManager.team) return;
  const sourceList = sourceManager.team[dragPayload.teamKey];
  const sourceIndex = dragPayload.index;
  if (!sourceList || !sourceList[sourceIndex]) return;
  let insertAt = targetIndex;
  if (sourceList === targetTeam[targetKey] && sourceIndex < insertAt) insertAt--;
  const [person] = sourceList.splice(sourceIndex, 1);
  targetTeam[targetKey].splice(Math.max(0, insertAt), 0, person);
  render();
  saveState({ action: 'Di chuyển nhân sự giữa các nhóm (kéo thả)' });
}

function bindAvatarClick(person) {
  return () => {
    pendingAvatarTarget = person.id;
    document.getElementById('file-input-avatar-trigger').click();
  };
}

function render() {
  applyOrgSettings();
  const root = document.getElementById('org-root');
  root.innerHTML = '';

  FLAT_TIERS_TOP.forEach((tier) => {
    root.appendChild(buildFlatTierColumn(tier, state[tier.id]));

    '<button class="tier-add" id="add-t4">+ Thêm</button>';

  avatarSm.onclick = bindAvatarClick(person);
  avatarSm.style.borderStyle = 'solid';
  avatarSm.style.borderColor = accent;
  avatarSm.style.color = accent;
  avatarSm.style.background = hexToRgba(accent, 0.12);

  profileBtn.type = 'button';
  profileBtn.title = 'Xem hồ sơ';
  profileBtn.setAttribute('aria-label', 'Xem hồ sơ');
  profileBtn.textContent = 'i';
  profileBtn.onclick = (event) => { event.stopPropagation(); openProfile(person); };
  rowDiv.appendChild(profileBtn);

  const flagBtn = document.createElement('button');
  flagBtn.type = 'button';
  flagBtn.setAttribute('aria-label', 'Trạng thái thông tin hồ sơ');

    const incomplete = isPersonInfoIncomplete(person);
    if (!incomplete && person.confirmedComplete) person.confirmedComplete = false;
    const needsReview = incomplete && !person.confirmedComplete;
    const confirmedIncomplete = incomplete && person.confirmedComplete;
    rowDiv.classList.toggle('is-flagged', needsReview);

      flagBtn.className = 'flag-btn-sm is-warning';

      flagBtn.className = 'flag-btn-sm is-hidden';
      flagBtn.innerHTML = '';

    event.stopPropagation();
    person.confirmedComplete = !person.confirmedComplete;
