<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sơ đồ phân cấp nhân sự</title>
<style>
  :root {
    --bg-page: #eef1f6;
    --surface: #ffffff;
    --border: #e3e6ec;
    --border-strong: #c7cdd9;
    --text-primary: #171a21;
    --text-secondary: #5b6270;
    --text-muted: #8b93a3;
    --brand: #185FA5;
    --brand-soft: #eaf2fb;
    --radius-lg: 16px;
    --radius-md: 12px;
    --radius-sm: 8px;
    --shadow-xs: 0 1px 2px rgba(16, 24, 40, 0.05);
    --shadow-sm: 0 1px 3px rgba(16, 24, 40, 0.07), 0 1px 2px rgba(16, 24, 40, 0.04);
    --shadow-md: 0 8px 20px rgba(16, 24, 40, 0.09), 0 2px 6px rgba(16, 24, 40, 0.05);
    --shadow-lg: 0 20px 44px rgba(16, 24, 40, 0.14);
    --ease-out: cubic-bezier(.22, 1, .36, 1);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background:
      radial-gradient(circle at 0% 0%, rgba(24, 95, 165, 0.05), transparent 45%),
      radial-gradient(circle at 100% 0%, rgba(15, 110, 86, 0.05), transparent 45%),
      var(--bg-page);
    background-attachment: fixed;
    color: var(--text-primary);
    padding: 24px 16px 60px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1300px; margin: 0 auto; }
  .org-heading { display: flex; align-items: center; gap: 14px; margin-bottom: 4px; }
  .company-logo { display: none; width: 44px; height: 44px; object-fit: contain; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); box-shadow: var(--shadow-xs); }
  h1 { font-size: 21px; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.01em; }
  .org-heading h1 { color: var(--text-primary); }
  .sub { font-size: 13px; color: var(--text-secondary); margin: 0 0 20px; line-height: 1.5; }
  .toolbar {
    display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; align-items: center;
    background: rgba(255,255,255,0.6); border: 1px solid var(--border); border-radius: var(--radius-md);
    padding: 8px; backdrop-filter: blur(6px);
  }
  .toolbar button {
    height: 34px; padding: 0 14px; font-size: 13px; font-weight: 500; border-radius: var(--radius-sm);
    border: 1px solid var(--border-strong); background: var(--surface);
    color: var(--text-primary); cursor: pointer; box-shadow: var(--shadow-xs);
    transition: transform .12s var(--ease-out), box-shadow .12s var(--ease-out), background .12s var(--ease-out), border-color .12s var(--ease-out);
  }
  .toolbar button:hover { background: var(--brand-soft); border-color: #b7d3ec; color: var(--brand); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .toolbar button:active { transform: translateY(0); box-shadow: none; }
  .toolbar button.danger { color: #a32d2d; border-color: #e0b9b9; }
  .toolbar button.danger:hover { background: #fbeeee; border-color: #e0b9b9; color: #a32d2d; }
  .zoom-group {
    display: flex; align-items: center; gap: 2px; border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm); padding: 3px; background: var(--surface); margin-left: auto; box-shadow: var(--shadow-xs);
  }
  .zoom-group button {
    height: 28px; width: 28px; border: none; background: transparent; border-radius: 6px;
    cursor: pointer; font-size: 15px; color: var(--text-primary); padding: 0;
    transition: background .12s var(--ease-out), color .12s var(--ease-out);
    box-shadow: none;
  }
  .zoom-group button:hover { background: var(--brand-soft); color: var(--brand); transform: none; }
  .zoom-label { font-size: 12px; color: var(--text-secondary); width: 44px; text-align: center; }

  .viewport {
    overflow: auto; border: 1px solid var(--border); border-radius: var(--radius-lg);
    background: var(--surface); max-height: 78vh; padding: 32px;
    box-shadow: var(--shadow-md);
  }

  .tier-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 4px; gap: 10px; }
  .tier-title { display: flex; align-items: center; gap: 9px; font-size: 14px; font-weight: 700; white-space: nowrap; letter-spacing: -0.005em; }
  .tier-bar { width: 5px; height: 16px; border-radius: 3px; display: inline-block; }
  .tier-add {
    height: 30px; padding: 0 13px; font-size: 12px; font-weight: 500; border-radius: var(--radius-sm);
    border: 1px dashed var(--border-strong); background: transparent; color: var(--text-secondary); cursor: pointer; white-space: nowrap;
    transition: background .12s var(--ease-out), border-color .12s var(--ease-out), color .12s var(--ease-out);
  }
  .tier-add:hover { background: var(--brand-soft); border-color: #b7d3ec; border-style: solid; color: var(--brand); }

  .tier-col { display: flex; flex-direction: column; flex-shrink: 0; align-self: stretch; }
  .row { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 6px 4px 16px; flex: 1; }

  .card {
    border-radius: var(--radius-md); border: 1px solid var(--border); padding: 14px 12px 12px; width: 140px;
    display: flex; flex-direction: column; align-items: center; gap: 7px; position: relative;
    background: var(--surface); flex-shrink: 0; box-shadow: var(--shadow-sm);
    transition: transform .16s var(--ease-out), box-shadow .16s var(--ease-out), border-color .16s var(--ease-out);
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 14px; right: 14px; height: 3px; border-radius: 0 0 3px 3px;
    background: var(--card-accent, var(--border-strong));
  }
  .card:hover:not(.is-dragging) { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: #d7dbe3; }
  /* Các vị trí điều hành cần nhiều chỗ hơn để tên dài không bị khuất. */
  .card.executive-card { width: 200px; padding: 16px 14px 14px; }
  .card.executive-card .avatar { width: 60px; height: 60px; }
  .card.executive-card .name-input { height: 34px; font-size: 14px; }
  .card.executive-card .role-label { font-size: 11px; padding: 3px 10px; }
  .card .remove {
    position: absolute; top: 7px; right: 7px; width: 22px; height: 22px; border: none;
    background: transparent; color: var(--text-muted); cursor: pointer; font-size: 14px;
    line-height: 1; border-radius: 6px; opacity: 0; transition: opacity .12s var(--ease-out), background .12s var(--ease-out), color .12s var(--ease-out);
  }
  .card:hover .remove, .card:focus-within .remove { opacity: 1; }
  .card .remove:hover { background: #fbeeee; color: #a32d2d; }
  .profile-btn {
    position: absolute; top: 7px; left: 7px; width: 22px; height: 22px; border: none;
    background: transparent; color: var(--text-muted); cursor: pointer; font-size: 12px;
    line-height: 1; border-radius: 6px; padding: 0; opacity: 0; transition: opacity .12s var(--ease-out), background .12s var(--ease-out), color .12s var(--ease-out);
  }
  .card:hover .profile-btn, .card:focus-within .profile-btn { opacity: 1; }
  .profile-btn:hover { background: var(--brand-soft); color: #185FA5; }
  .avatar {
    width: 52px; height: 52px; border-radius: 50%; background: #ffffff;
    border: 2px dashed var(--border-strong); display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); overflow: hidden; cursor: pointer; flex-shrink: 0;
    transition: border-color .16s var(--ease-out);
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .avatar svg { width: 24px; height: 24px; }
  .name-input {
    width: 100%; height: 30px; font-size: 13px; font-weight: 600; text-align: center; padding: 0 6px;
    border-radius: 7px; border: 1px solid transparent; background: transparent; color: var(--text-primary);
    transition: border-color .12s var(--ease-out), background .12s var(--ease-out);
  }
  .name-input:hover { background: #f7f8fa; }
  .name-input:focus { outline: none; border-color: #185FA5; background: #fff; box-shadow: 0 0 0 3px var(--brand-soft); }
  .role-label {
    font-size: 10.5px; font-weight: 700; color: var(--card-accent, var(--text-secondary)); text-align: center;
    text-transform: uppercase; letter-spacing: 0.03em; background: var(--card-accent-soft, #f2f3f5);
    padding: 2px 9px; border-radius: 999px;
  }
  .person-title { font-size: 11px; color: var(--text-secondary); text-align: center; line-height: 1.3; min-height: 14px; }

  .connector { position: relative; width: 44px; align-self: stretch; flex-shrink: 0; }
  .static-line { height: 1px; width: 16px; background: var(--border-strong); margin: auto 0; flex-shrink: 0; }

  .add-mini {
    height: 24px; padding: 0 10px; font-size: 11px; border-radius: 7px;
    border: 1px dashed var(--border-strong); background: transparent; color: var(--text-secondary);
    cursor: pointer; margin-top: 4px; white-space: nowrap;
  }
  .add-mini:hover { background: rgba(0,0,0,0.03); }

  #org-root { display: flex; flex-direction: row; align-items: stretch; }

  /* Bố cục dọc: mỗi cấp nằm trên/dưới cấp kế tiếp, vẫn giữ nguyên dữ liệu sơ đồ. */
  #org-root.layout-vertical { flex-direction: column; align-items: stretch; min-width: max-content; }
  #org-root.layout-vertical .tier-col { flex-direction: column; align-items: stretch; min-height: 0; }
  #org-root.layout-vertical .tier-header {
    width: auto; min-width: 0; padding: 10px 4px 2px; justify-content: center;
  }
  #org-root.layout-vertical .row {
    flex-direction: row; align-items: center; justify-content: center;
    gap: 12px; padding: 8px 4px 14px; min-height: 0;
  }
  #org-root.layout-vertical .connector { width: auto; height: 44px; min-height: 44px; align-self: stretch; }
  #org-root.layout-vertical .groups-container {
    flex-direction: row; justify-content: center; align-items: flex-start; gap: 18px; padding: 8px 4px 16px;
  }
  #org-root.layout-vertical .group-block { min-width: max-content; }

  .groups-container { display: flex; flex-direction: column; gap: 20px; padding: 6px 4px 16px; }
  .group-block {
    display: flex; flex-direction: column; gap: 12px;
    border: 1px solid var(--border); border-left: 3px solid var(--border-strong); border-radius: var(--radius-md); padding: 16px;
    background: var(--surface); position: relative; box-shadow: var(--shadow-xs);
    transition: box-shadow .16s var(--ease-out), transform .16s var(--ease-out);
  }
  .group-block:hover { box-shadow: var(--shadow-sm); }
  .group-body { display: flex; flex-direction: row; align-items: flex-start; }
  .dept-input {
    font-size: 13px; font-weight: 700; padding: 7px 12px; border-radius: var(--radius-sm);
    border: 1px solid transparent; background: transparent; width: 240px;
    max-width: 100%; color: var(--text-primary); transition: background .12s var(--ease-out), border-color .12s var(--ease-out);
  }
  .dept-input:hover { background: #f7f8fa; }
  .dept-input:focus { outline: none; border-color: #185FA5; background: #fff; box-shadow: 0 0 0 3px var(--brand-soft); }
  .dept-input::placeholder { font-weight: 400; color: var(--text-muted); }
  .group-remove {
    position: absolute; top: -10px; right: -10px; width: 24px; height: 24px; border-radius: 50%;
    border: 1px solid var(--border-strong); background: var(--surface); color: var(--text-muted);
    cursor: pointer; font-size: 13px; line-height: 1; box-shadow: var(--shadow-xs);
    transition: color .12s var(--ease-out), border-color .12s var(--ease-out), transform .12s var(--ease-out);
  }
  .group-remove:hover { color: #a32d2d; border-color: #e0b9b9; transform: scale(1.08); }
  .group-collapse {
    position: absolute; top: -10px; right: 20px; height: 24px; padding: 0 8px; border-radius: 12px;
    border: 1px solid var(--border-strong); background: var(--surface); color: var(--text-secondary); cursor: pointer; font-size: 11px;
    box-shadow: var(--shadow-xs); transition: color .12s var(--ease-out), border-color .12s var(--ease-out);
  }
  .group-collapse:hover { color: #185FA5; border-color: #9bc4e4; }

  .group-col { display: flex; flex-direction: column; align-items: center; }
  .subgroups-col { display: flex; flex-direction: column; gap: 18px; align-items: flex-start; }
  .subgroup-block { display: flex; flex-direction: row; align-items: flex-start; }
  .subgroup-col { display: flex; flex-direction: column; align-items: center; }
  .leaves-col { display: flex; flex-direction: column; gap: 14px; align-items: flex-start; }
  .leaf-block { display: flex; flex-direction: row; align-items: center; }

  .team-table {
    display: flex; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden;
    background: #fbfbfc;
  }
  .team-col {
    display: flex; flex-direction: column; padding: 10px;
    border-right: 1px solid var(--border);
  }
  .team-col-body { display: flex; flex-direction: row; flex-wrap: wrap; gap: 10px; align-items: flex-start; }
  .team-col-chunk { display: flex; flex-direction: column; width: 150px; flex-shrink: 0; }
  .team-col:last-child { border-right: none; }
  .team-col-header {
    font-size: 10.5px; font-weight: 700; text-align: center; padding-bottom: 7px;
    margin-bottom: 7px; border-bottom: 1px solid var(--border); color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .team-row {
    display: flex; align-items: center; gap: 6px; margin-bottom: 6px; padding: 4px 5px;
    border-radius: 8px; background: var(--surface); border: 1px solid var(--border);
    transition: box-shadow .14s var(--ease-out), border-color .14s var(--ease-out), transform .14s var(--ease-out);
  }
  .team-row:hover:not(.is-dragging) { box-shadow: var(--shadow-xs); border-color: #d7dbe3; }
  .card[draggable="true"], .team-row[draggable="true"] { cursor: grab; }
  .card.is-dragging, .team-row.is-dragging { opacity: 0.42; cursor: grabbing; }
  .card.is-drop-target, .team-row.is-drop-target { outline: 2px dashed #185FA5; outline-offset: 3px; }
  .team-col-body.is-drop-target { background: var(--brand-soft); border-radius: 8px; }
  .avatar-sm {
    width: 36px; height: 36px; border-radius: 50%; background: #ffffff;
    border: 2px dashed var(--border-strong); display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); overflow: hidden; cursor: pointer; flex-shrink: 0;
    transition: border-color .14s var(--ease-out);
  }
  .avatar-sm img { width: 100%; height: 100%; object-fit: cover; }
  .avatar-sm svg { width: 18px; height: 18px; }
  .team-row input {
    flex: 1; height: 26px; font-size: 12px; font-weight: 500; padding: 0 6px; border-radius: 5px;
    border: 1px solid transparent; background: transparent; min-width: 0; color: var(--text-primary);
    transition: background .12s var(--ease-out), border-color .12s var(--ease-out);
  }
  .team-row input:hover { background: #f2f3f5; }
  .team-row input:focus { outline: none; border-color: #185FA5; background: #fff; box-shadow: 0 0 0 3px var(--brand-soft); }
  .team-row button {
    width: 20px; height: 20px; border: none; background: transparent; color: var(--text-muted);
    cursor: pointer; font-size: 12px; border-radius: 5px; flex-shrink: 0;
    transition: background .12s var(--ease-out), color .12s var(--ease-out);
  }
  .team-row button:hover { background: #fbeeee; color: #a32d2d; }
  .team-row .profile-btn { position: static; width: 20px; height: 20px; flex-shrink: 0; }
  .team-row .profile-btn:hover { background: var(--brand-soft); color: #185FA5; }
  .team-row .profile-btn { opacity: 1; }
  .team-col .add-mini { width: 100%; margin-top: 2px; }

  .status { font-size: 12px; color: var(--text-muted); text-align: right; margin-top: 12px; min-height: 16px; }
  .drag-hint { font-size: 12px; color: var(--text-secondary); }
  .search-input, .filter-select { height: 34px; border: 1px solid var(--border-strong); border-radius: 8px; background: #fff; color: var(--text-primary); font-size: 13px; padding: 0 10px; }
  .search-input { width: 190px; }
  .is-filtered-out { display: none !important; }
  .profile-modal {
    position: fixed; inset: 0; z-index: 20; display: none; align-items: center; justify-content: center;
    padding: 20px; background: rgba(26, 27, 25, 0.38);
  }
  .profile-modal.is-open { display: flex; }
  .profile-dialog { width: min(460px, 100%); background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 16px 44px rgba(0,0,0,0.2); }
  .profile-dialog h2 { font-size: 17px; margin: 0 0 16px; }
  .profile-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
  .profile-field label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
  .profile-field input, .profile-field textarea { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font: inherit; font-size: 13px; }
  .profile-field textarea { min-height: 74px; resize: vertical; }
  .profile-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
  .profile-actions button { height: 34px; padding: 0 14px; border: 1px solid var(--border-strong); border-radius: 8px; background: #fff; cursor: pointer; }
  .profile-actions .save-profile { color: #fff; background: #185FA5; border-color: #185FA5; }
  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .settings-grid .profile-field.full-width { grid-column: 1 / -1; }
  .settings-upload-row { display: flex; align-items: center; gap: 8px; }
  .settings-upload-row button { height: 32px; padding: 0 10px; font-size: 12px; border-radius: 7px; border: 1px solid var(--border-strong); background: #fff; cursor: pointer; white-space: nowrap; }
  .settings-upload-row button:hover { background: #f0efe9; }
  .settings-preview { width: 40px; height: 40px; border-radius: 8px; object-fit: contain; border: 1px solid var(--border); background: #fff; flex-shrink: 0; display: none; }
  .settings-preview.is-visible { display: block; }
  .settings-preview.bg-preview { object-fit: cover; border-radius: 6px; }
  .profile-dialog-lg { width: min(640px, 100%); max-height: 86vh; overflow-y: auto; }
  .profile-section-title { font-size: 12px; font-weight: 700; color: var(--brand); margin: 16px 0 8px; text-transform: uppercase; letter-spacing: 0.04em; border-top: 1px solid var(--border); padding-top: 14px; }
  .profile-section-title.is-first { border-top: none; padding-top: 0; margin-top: 0; }
  .profile-field select { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font: inherit; font-size: 13px; background: #fff; }
  .file-link { font-size: 12px; color: var(--brand); text-decoration: none; }
  .file-link:not([href]) { color: var(--text-muted); cursor: default; }
  .file-list { list-style: none; padding: 0; margin: 6px 0 0; display: flex; flex-direction: column; gap: 6px; }
  .file-list li { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 12px; background: #f7f8fa; padding: 6px 10px; border-radius: 8px; }
  .file-list li a { color: var(--brand); text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-list li button { border: none; background: transparent; color: var(--text-muted); cursor: pointer; font-size: 12px; flex-shrink: 0; }
  .file-list li button:hover { color: #a32d2d; }
  .file-list li.is-empty { color: var(--text-muted); background: none; padding: 0; }
  .file-remove-btn { border: none; background: transparent; color: #a32d2d; cursor: pointer; font-size: 12px; padding: 0; flex-shrink: 0; }
  .file-remove-btn:hover { text-decoration: underline; }
  .attachment-preview { display: none; margin-top: 10px; border: 1px solid var(--border); border-radius: var(--radius-md); background: #f7f8fa; padding: 10px; }
  .attachment-preview.is-visible { display: block; }
  .attachment-preview .preview-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .attachment-preview .preview-name { font-size: 12px; font-weight: 600; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .attachment-preview .preview-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .attachment-preview .preview-actions a, .attachment-preview .preview-actions button {
    font-size: 11px; padding: 3px 9px; border-radius: 6px; border: 1px solid var(--border-strong);
    background: var(--surface); color: var(--text-secondary); text-decoration: none; cursor: pointer;
  }
  .attachment-preview .preview-actions a:hover, .attachment-preview .preview-actions button:hover { color: var(--brand); border-color: #b7d3ec; }
  .attachment-preview .preview-body { max-height: 60vh; overflow: auto; text-align: center; }
  .attachment-preview .preview-body img { max-width: 100%; border-radius: 8px; }
  .attachment-preview .preview-body iframe { width: 100%; height: 55vh; border: none; border-radius: 8px; background: #fff; }
  .attachment-preview .preview-loading { font-size: 12px; color: var(--text-secondary); padding: 20px 0; }
  .upload-status { font-size: 12px; color: var(--text-secondary); min-height: 16px; margin-top: 8px; }
  .settings-range-row { display: flex; align-items: center; gap: 8px; }
  .settings-range-row input[type="range"] { flex: 1; }
  .settings-range-row .range-value { font-size: 12px; color: var(--text-secondary); width: 34px; text-align: right; }
  .settings-select { height: 34px; border-radius: 8px; border: 1px solid var(--border); padding: 0 8px; font: inherit; font-size: 13px; background: #fff; width: 100%; }
  input[type="file"] { display: none; }

  /* Màu theo phòng ban: ô chọn màu nhỏ cạnh tên bộ phận */
  .group-header-row { display: flex; align-items: center; gap: 8px; }
  .group-header-row .dept-input { flex: 1; }
  .dept-color-input { width: 34px; height: 34px; padding: 2px; border: 1px solid var(--border-strong); border-radius: 8px; background: #fff; cursor: pointer; flex-shrink: 0; }

  /* Ảnh nền tùy chỉnh phía sau sơ đồ */
  .viewport { position: relative; }
  .viewport::before {
    content: ''; position: absolute; inset: 0; border-radius: 14px; pointer-events: none; z-index: 0;

<script>

     1) Vào link sơ đồ → F12 → tab Console → dán:
        crypto.subtle.digest('SHA-256', new TextEncoder().encode("mật_khẩu_mới")).then(b=>console.log(Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')))
     2) Copy chuỗi hash in ra, thay vào EDIT_PASSWORD_HASH bên dưới.
     3) Sửa trực tiếp trên GitHub (nút bút chì ✏️ ở file index.html) → Commit.
   Mật khẩu hiện tại: 0107
   ============================================================ */
const EDIT_PASSWORD_HASH = "0c3d5517d7fe7feafefb2e59f5e1a9820cf2163afc655a74af95ee94e7e0f5a7";
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAakaR1xeMoXot21XtPzmJgXis8wledE4s",
  authDomain: "an-g-17edb.firebaseapp.com",
  projectId: "an-g-17edb",

};
// Tên document lưu sơ đồ trên Firestore (có thể đổi nếu muốn tách nhiều sơ đồ khác nhau)
const DOC_PATH = { collection: 'orgcharts', doc: 'main' };

let firebaseReady = false;
let db = null;
let docRef = null;
let historyColRef = null;
let filesColRef = null;
try {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.firestore();
  docRef = db.collection(DOC_PATH.collection).doc(DOC_PATH.doc);
  historyColRef = docRef.collection('history'); // lưu lịch sử ở collection con riêng, tách khỏi tài liệu chính để không vượt giới hạn 1MB khi có ảnh
  filesColRef = db.collection('nhansu_files'); // lưu tệp đính kèm hồ sơ (CCCD/hợp đồng/bằng cấp) thành từng tài liệu riêng trong Firestore, KHÔNG dùng Firebase Storage (Storage yêu cầu nâng cấp gói trả phí)
  firebaseReady = true;
} catch (err) {
  console.error('Không khởi tạo được Firebase:', err);
}

// Giới hạn dung lượng gốc cho tệp KHÔNG PHẢI ảnh (ví dụ PDF), vì không nén được như ảnh.
// Firestore giới hạn ~1MB/tài liệu, mã hóa base64 làm tệp phình to hơn ~37%, nên đặt ngưỡng an toàn thấp hơn nhiều.
const MAX_RAW_FILE_BYTES = 650 * 1024; // ~650KB

function fileToDataUrlRaw(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error('Không đọc được tệp.'));
    reader.readAsDataURL(file);
  });
}

// Lưu một tệp (ảnh/PDF) đính kèm hồ sơ nhân sự thành MỘT TÀI LIỆU RIÊNG trong Firestore
// (collection "nhansu_files"), tách khỏi tài liệu sơ đồ chính để không làm phình tài liệu chính.
// Ảnh sẽ được tự động nén nhỏ lại; PDF thì giữ nguyên nhưng bị giới hạn dung lượng.
async function uploadPersonFile(file, personId, kind) {
  if (!firebaseReady || !filesColRef) throw new Error('Chưa kết nối được Firebase.');
  let dataUrl;
  if (file.type.startsWith('image/')) {
    dataUrl = await compressImageFile(file, 1400, 'image/jpeg', 0.75);
  } else {
    if (file.size > MAX_RAW_FILE_BYTES) {
      throw new Error('Tệp quá lớn (giới hạn khoảng ' + Math.round(MAX_RAW_FILE_BYTES / 1024) + 'KB cho tệp PDF/không phải ảnh). Hãy nén tệp nhỏ lại hoặc chụp ảnh thay vì tải nguyên văn bản PDF.');
    }
    dataUrl = await fileToDataUrlRaw(file);
  }
  const added = await filesColRef.add({
    personId, kind, name: file.name, mimeType: file.type || 'application/octet-stream',
    dataUrl, createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  return { id: added.id, name: file.name };
}

// Hiển thị một tệp đã lưu ở Firestore (theo id tài liệu) NGAY TRONG khung xem trước của hồ sơ,
// không mở tab mới. Ảnh hiện trực tiếp; PDF hiện qua khung nhúng; các loại khác cho tải xuống.
async function openPersonFile(fileId) {
  if (!fileId) return;
  const box = profileModal.querySelector('#attachment-preview');
  if (!box) return;
  box.classList.add('is-visible');
  box.innerHTML = '<div class="preview-loading">Đang tải tệp...</div>';
  if (!firebaseReady || !filesColRef) { box.innerHTML = '<div class="preview-loading">Chưa kết nối được Firebase.</div>'; return; }
  try {
    const snap = await filesColRef.doc(fileId).get();
    if (!snap.exists) { box.innerHTML = '<div class="preview-loading">Không tìm thấy tệp này (có thể đã bị xóa).</div>'; return; }
    const data = snap.data();
    const res = await fetch(data.dataUrl);
    const blob = await res.blob();
    const blobUrl = URL.createObjectURL(blob);
    const mime = data.mimeType || '';
    let bodyHtml;
    if (mime.startsWith('image/')) {
      bodyHtml = '<img src="' + blobUrl + '" alt="' + (data.name || '') + '">';
    } else if (mime === 'application/pdf') {
      bodyHtml = '<iframe src="' + blobUrl + '"></iframe>';
    } else {
      bodyHtml = '<div class="preview-loading">Không xem trước được loại tệp này. Bấm "Tải xuống" để mở.</div>';
    }
    box.innerHTML =
      '<div class="preview-head">' +
        '<span class="preview-name">📎 ' + (data.name || 'Tệp đính kèm') + '</span>' +
        '<span class="preview-actions"><a download="' + (data.name || 'tep') + '" href="' + blobUrl + '">Tải xuống</a><button type="button" class="preview-close">✕ Đóng</button></span>' +
      '</div>' +
      '<div class="preview-body">' + bodyHtml + '</div>';
    box.querySelector('.preview-close').onclick = () => {
      box.classList.remove('is-visible');
      box.innerHTML = '';
      URL.revokeObjectURL(blobUrl);
    };
  } catch (err) {
    box.innerHTML = '<div class="preview-loading">Lỗi khi mở tệp: ' + err.message + '</div>';
  }
}

function ensureEditorName() {

  const name = prompt('Nhập tên của bạn để lưu vào lịch sử chỉnh sửa (VD: Chị Hoa - Kế toán):', '');
  currentEditorName = (name || '').trim() || 'Ẩn danh';
  try { localStorage.setItem(EDITOR_NAME_KEY, currentEditorName); } catch (err) {}
  return currentEditorName;
}

async function sha256Hex(text) {
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function updateLockUI() {
  const badge = document.getElementById('lock-badge');
  const btn = document.getElementById('btn-toggle-edit');
  const renameBtn = document.getElementById('btn-rename-editor');
  document.body.classList.toggle('view-mode', !editMode);
  if (editMode) {
    badge.textContent = '🔓 Đang chỉnh sửa' + (currentEditorName ? ' · ' + currentEditorName : '');
    badge.className = 'lock-badge is-edit';
    btn.textContent = '🔒 Khóa lại';
    btn.classList.add('is-edit');
    renameBtn.style.display = '';
  } else {
    badge.textContent = '🔒 Đang xem';
    badge.className = 'lock-badge is-view';
    btn.textContent = '🔓 Mở khóa chỉnh sửa';
    btn.classList.remove('is-edit');
    renameBtn.style.display = 'none';
  }
  lockFieldsIfNeeded(); // bật/tắt lại toàn bộ ô nhập liệu và nút theo trạng thái mới nhất
}

function genPersonId() {

function ensurePersonProfile(person) {
  ['title', 'phone', 'email', 'note', 'gender', 'dob', 'address', 'joinDate', 'status',
   'cccd', 'bhxh', 'salary', 'bank', 'cccdFileId', 'contractFileId'].forEach((key) => {
    if (typeof person[key] !== 'string') person[key] = '';
  });
  if (!person.status) person.status = 'Đang làm';
  if (!Array.isArray(person.degreeFiles)) person.degreeFiles = [];
  // Mỗi người cần một ID cố định để tra cứu lại đúng người đó sau này (ví dụ khi
  // đang mở hộp thoại chọn ảnh mà dữ liệu vừa được đồng bộ mới từ đám mây về —
  // nếu chỉ giữ tham chiếu object cũ thì ảnh sẽ bị gán "lạc" vào dữ liệu cũ đã bị thay thế).
  if (typeof person.id !== 'string' || !person.id) person.id = genPersonId();
  return person;
}

// Tìm đúng người (theo id) trong dữ liệu HIỆN TẠI (mới nhất) — dùng thay cho việc giữ
// tham chiếu object trực tiếp, vì object có thể đã bị thay thế bởi dữ liệu đồng bộ mới.
function findPersonById(id) {
  if (!id || !state) return null;
  for (const tier of FLAT_TIERS_TOP) {
    const found = (state[tier.id] || []).find((p) => p.id === id);
    if (found) return found;
  }
  for (const manager of state.t4 || []) {
    if (manager.id === id) return manager;
    for (const col of TEAM_COLS) {
      const found = (manager.team && manager.team[col.key] || []).find((p) => p.id === id);
      if (found) return found;
    }
  }
  return null;
}

function personSearchText(person, extra = '') {
  ensurePersonProfile(person);
  return [person.name, person.title, person.phone, person.email, person.note, person.cccd, person.address, extra].join(' ').toLocaleLowerCase('vi-VN');
}

  });
}

// (để không lưu mãi thông tin nhạy cảm như CCCD của người đã bị gỡ tệp).
async function deletePersonFile(fileId) {
  if (fileId && firebaseReady && filesColRef) {
    try { await filesColRef.doc(fileId).delete(); } catch (err) { console.error('Không xóa được tệp trên Firestore:', err); }
  }
}

function renderDegreeList() {
  const list = profileModal.querySelector('#degree-file-list');
  list.innerHTML = '';
  const files = profileTarget ? (profileTarget.degreeFiles || []) : [];
  if (!files.length) {
    list.innerHTML = '<li class="is-empty">Chưa có tệp nào</li>';
    return;
  }
  files.forEach((f, idx) => {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = '#'; a.textContent = '📎 ' + (f.name || ('Tệp ' + (idx + 1)));
    a.onclick = (e) => { e.preventDefault(); openPersonFile(f.id); };
    li.appendChild(a);
    if (editMode) {
      const rm = document.createElement('button');
      rm.type = 'button'; rm.textContent = '✕ Xóa'; rm.title = 'Bỏ tệp này khỏi hồ sơ';
      rm.onclick = () => {
        if (!confirm('Xóa tệp "' + (f.name || '') + '" khỏi hồ sơ?')) return;
        deletePersonFile(f.id);
        profileTarget.degreeFiles.splice(idx, 1);
        renderDegreeList();
        setProfileUploadStatus('Đã xóa tệp. Nhớ bấm "Lưu hồ sơ" để lưu lại.');
      };
      li.appendChild(rm);
    }
    list.appendChild(li);
  });
}

// Tệp ảnh tạm cho logo/ảnh nền khi người dùng chọn "Tải ảnh lên" (chỉ ghi vào state khi bấm Lưu)
let pendingLogoDataUrl = null;
let pendingBgDataUrl = null;

function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// Thu nhỏ & nén ảnh trước khi lưu (tránh ảnh gốc từ điện thoại quá nặng làm vượt giới hạn lưu trữ)
// maxDim: kích thước cạnh dài nhất tối đa (px). mimeType/quality: định dạng và chất lượng nén xuất ra.
function compressImageFile(file, maxDim, mimeType, quality) {
  return new Promise((resolve, reject) => {
    fileToDataURL(file).then((dataUrl) => {
      const img = new Image();
      img.onerror = () => reject(new Error('Không đọc được ảnh.'));
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        try {
          resolve(canvas.toDataURL(mimeType, quality));
        } catch (err) {
          reject(err);
        }
      };
      img.src = dataUrl;
    }).catch(reject);
  });
}
function updateSettingsPreview(imgEl, src) {
  if (src) { imgEl.src = src; imgEl.classList.add('is-visible'); }
  else { imgEl.src = ''; imgEl.classList.remove('is-visible'); }

function hexToRgba(hex, alpha) {
  const h = hex.replace('#', '');
  const full = h.length === 3 ? h.split('').map((c) => c + c).join('') : h;
  const bigint = parseInt(full, 16);
  const r = (bigint >> 16) & 255;
  const g = (bigint >> 8) & 255;
  const b = bigint & 255;
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}

function loadState() {
  // Hiển thị tạm bằng bản nhớ đệm cục bộ (nếu có) trong lúc chờ tải từ đám mây, cho cảm giác mượt hơn
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { state = JSON.parse(raw); render(); }
  } catch (err) { /* bỏ qua, sẽ chờ dữ liệu từ đám mây */ }

  if (!state) { state = defaultState(); render(); }

  if (!firebaseReady) {
    setStatus('⚠️ Chưa kết nối được đám mây — đang chạy chế độ lưu tạm trên máy này. Xem console (F12) để biết chi tiết lỗi.');
    return;
  }

  setStatus('Đang kết nối đám mây...');

  // Lắng nghe realtime: mọi thay đổi (kể cả từ người khác) sẽ tự cập nhật lên đây
  docRef.onSnapshot((snap) => {
    if (snap.metadata.hasPendingWrites) return; // bỏ qua tiếng vọng của chính lần ghi của mình
    if (!snap.exists) {
      // Chưa có dữ liệu trên đám mây -> khởi tạo bằng dữ liệu mặc định
      docRef.set({ state: defaultState(), updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      return;
    }
    const data = snap.data();
    state = data.state || defaultState();
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
    render();
    setStatus('Đã đồng bộ với đám mây · ' + new Date().toLocaleTimeString('vi-VN'));
  }, (err) => {
    setStatus('Không kết nối được đám mây: ' + err.message);
  });
}

function saveState(options = {}) {
  if (!editMode) return; // người chỉ xem không được ghi lên đám mây
  const actionLabel = options.action || 'Cập nhật sơ đồ';

  if (!firebaseReady) {
    // Chế độ dự phòng: chỉ lưu trên máy này, giống bản gốc chưa nối đám mây
    try {
      const entry = { name: currentEditorName || 'Ẩn danh', at: new Date().toISOString(), state: state, action: actionLabel };
      editHistory = [entry, ...(Array.isArray(editHistory) ? editHistory : [])].slice(0, 20);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      setStatus('⚠️ Đã lưu tạm trên máy này (chưa có đám mây để đồng bộ cho người khác).');
    } catch (err) {
      setStatus('Không lưu được: ' + err.message);
      alert('Không lưu được trên máy này (có thể do ảnh vừa chọn quá lớn). Hãy thử chọn ảnh khác hoặc dung lượng nhỏ hơn.');
    }
    return;
  }

  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      // Tài liệu chính chỉ chứa dữ liệu sơ đồ hiện tại — gọn nhẹ, không kèm lịch sử để tránh vượt giới hạn dung lượng
      await docRef.set({ state, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
      setStatus('Đã lưu lên đám mây · ' + new Date().toLocaleTimeString('vi-VN'));

      // Ghi một dòng lịch sử riêng (không ảnh hưởng tới việc lưu dữ liệu chính ở trên dù có lỗi)
      try {
        await historyColRef.add({
          name: currentEditorName || 'Ẩn danh',
          at: new Date().toISOString(),
          action: actionLabel,
          state: state,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        pruneOldHistory();
      } catch (histErr) {
        console.error('Không ghi được lịch sử (dữ liệu chính vẫn đã lưu an toàn):', histErr);
      }
    } catch (err) {
      setStatus('Không lưu được lên đám mây: ' + err.message);
      const sizeIssue = /longer than|exceeds|too large|invalid-argument|resource-exhausted/i.test(err.message || '');
      alert(
        'Không lưu được lên đám mây.\n\nLý do: ' + err.message +
        (sizeIssue ? '\n\nCó thể ảnh bạn vừa tải lên quá lớn. Hãy thử chọn ảnh khác hoặc ảnh có dung lượng nhỏ hơn.' : '')
      );
    }
  }, 300);
}

// Xóa bớt các dòng lịch sử cũ, chỉ giữ lại 20 dòng gần nhất để collection không phình to mãi
async function pruneOldHistory() {
  try {
    const snap = await historyColRef.orderBy('at', 'desc').get();
    const docs = snap.docs;
    if (docs.length <= 20) return;
    const toDelete = docs.slice(20);
    await Promise.all(toDelete.map((d) => d.ref.delete()));
  } catch (err) {
    console.error('Không dọn được lịch sử cũ:', err);
  }
}

// Phát hiệu ứng "biến mất" cho một thẻ/khối trước khi thật sự xóa khỏi dữ liệu.
// Giúp việc xóa nhân sự trông mượt mà thay vì biến mất đột ngột.
function removeWithAnimation(el, applyStateChange) {
  const prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (!el || prefersReduced) { applyStateChange(); return; }
  let done = false;
  const finish = () => { if (done) return; done = true; applyStateChange(); };
  el.classList.add('is-leaving');
  el.addEventListener('transitionend', finish, { once: true });
  setTimeout(finish, 200); // dự phòng nếu transitionend không bắn ra (VD phần tử bị ẩn)
}

function startDrag(event, payload, el) {
  if (!editMode) { event.preventDefault(); return; }
  dragPayload = payload;
  event.dataTransfer.effectAllowed = 'move';
  event.dataTransfer.setData('text/plain', payload.kind);
  el.classList.add('is-dragging');
}

function finishDrag(el) {
  dragPayload = null;
  document.querySelectorAll('.is-drop-target').forEach(target => target.classList.remove('is-drop-target'));
  el.classList.remove('is-dragging');
}

function makeFlatCardDraggable(card, tierId, index) {
  card.draggable = true;
  card.addEventListener('dragstart', (event) => startDrag(event, { kind: 'flat', tierId, index }, card));
  card.addEventListener('dragend', () => finishDrag(card));
  card.addEventListener('dragover', (event) => {
    if (editMode && dragPayload?.kind === 'flat' && dragPayload.tierId === tierId) {
      event.preventDefault();
      card.classList.add('is-drop-target');
    }
  });
  card.addEventListener('dragleave', () => card.classList.remove('is-drop-target'));
  card.addEventListener('drop', (event) => {
    event.preventDefault();
    card.classList.remove('is-drop-target');
    if (!dragPayload || dragPayload.kind !== 'flat' || dragPayload.tierId !== tierId || dragPayload.index === index) return;
    const list = state[tierId];
    const [person] = list.splice(dragPayload.index, 1);
    list.splice(dragPayload.index < index ? index - 1 : index, 0, person);
    render();
    saveState({ action: 'Sắp xếp lại thứ tự nhân sự (kéo thả)' });
  });
}

function makeTeamRowDraggable(row, managerIndex, teamKey, index) {
  row.draggable = true;
  row.addEventListener('dragstart', (event) => startDrag(event, { kind: 'team', managerIndex, teamKey, index }, row));
  row.addEventListener('dragend', () => finishDrag(row));
}

function moveTeamPerson(targetTeam, targetKey, targetIndex) {
  if (!dragPayload || dragPayload.kind !== 'team') return;
  const sourceManager = state.t4[dragPayload.managerIndex];
  if (!sourceManager || !sourceManager.team) return;
  const sourceList = sourceManager.team[dragPayload.teamKey];
  const sourceIndex = dragPayload.index;
  if (!sourceList || !sourceList[sourceIndex]) return;
  let insertAt = targetIndex;
  if (sourceList === targetTeam[targetKey] && sourceIndex < insertAt) insertAt--;
  const [person] = sourceList.splice(sourceIndex, 1);
  targetTeam[targetKey].splice(Math.max(0, insertAt), 0, person);
  render();
  saveState({ action: 'Di chuyển nhân sự giữa các nhóm (kéo thả)' });
}

function bindAvatarClick(person) {

function lockFieldsIfNeeded() {
  const root = document.getElementById('org-root');
  root.querySelectorAll('input').forEach((el) => { el.disabled = !editMode; });
  root.querySelectorAll('button:not(.profile-btn):not(.group-collapse)').forEach((el) => { el.disabled = !editMode; });

function buildFlatTierColumn(tier, list) {
  const col = document.createElement('div');
  col.className = 'tier-col';

  const header = document.createElement('div');
  header.className = 'tier-header';
  header.innerHTML =
    '<div class="tier-title"><span class="tier-bar" style="background:' + tier.accent + '"></span><span>' + tier.title + '</span></div>' +
    '<button class="tier-add" data-add-flat="' + tier.id + '">+ Thêm</button>';
  col.appendChild(header);

  const row = document.createElement('div');
  row.className = 'row';
  row.id = 'row-' + tier.id;

  list.forEach((person, pIdx) => {
    const card = createCard(
      person,
      tier.title,
      () => {
        removeWithAnimation(card, () => {
          state[tier.id].splice(pIdx, 1);
          if (state[tier.id].length === 0) state[tier.id].push(emptyPerson());
          render();
          saveState({ action: 'Xóa nhân sự: ' + (person.name || '(trống)') });
        });
      },
      bindAvatarClick(person),
      tier.accent
    );
    makeFlatCardDraggable(card, tier.id, pIdx);
    row.appendChild(card);
  });

  col.appendChild(row);

  col.querySelector('[data-add-flat]').onclick = () => {
    state[tier.id].push(emptyPerson());
    render();
    saveState({ action: 'Thêm nhân sự mới vào ' + tier.title });
  };

  return col;
}

function buildTrungCapGroup(manager, i) {
  const block = document.createElement('div');
  block.className = 'group-block';

  const removeGroupBtn = document.createElement('button');
  removeGroupBtn.className = 'group-remove';
  removeGroupBtn.setAttribute('aria-label', 'Xóa quản lý trung cấp này');
  removeGroupBtn.textContent = '✕';
  removeGroupBtn.onclick = () => {
    removeWithAnimation(block, () => {
      state.t4.splice(i, 1);
      if (state.t4.length === 0) state.t4.push(emptyTrungCap());
      render();
      saveState({ action: 'Xóa bộ phận: ' + (manager.dept || '(chưa đặt tên)') });

const TEAM_CHUNK_SIZE = 5;

function buildTeamTable(team, managerIndex, accentColor) {
  const accent = accentColor || T4.accent;
  const table = document.createElement('div');
  table.className = 'team-table';

  TEAM_COLS.forEach(col => {
    team[col.key] = team[col.key] || [];
    const list = team[col.key];

    const colDiv = document.createElement('div');
    colDiv.className = 'team-col';

    const header = document.createElement('div');
    header.className = 'team-col-header';
    header.textContent = col.title;
    header.style.color = accent;
    colDiv.appendChild(header);

    const body = document.createElement('div');
    body.className = 'team-col-body';
    body.addEventListener('dragover', (event) => {
      if (editMode && dragPayload?.kind === 'team') {
        event.preventDefault();
        body.classList.add('is-drop-target');
      }
    });
    body.addEventListener('dragleave', (event) => {
      if (!body.contains(event.relatedTarget)) body.classList.remove('is-drop-target');
    });
    body.addEventListener('drop', (event) => {
      event.preventDefault();
      body.classList.remove('is-drop-target');
      moveTeamPerson(team, col.key, team[col.key].length);
    });

    const numChunks = Math.max(1, Math.ceil(list.length / TEAM_CHUNK_SIZE));
    for (let c = 0; c < numChunks; c++) {
      const start = c * TEAM_CHUNK_SIZE;
      const chunkItems = list.slice(start, start + TEAM_CHUNK_SIZE);
      const chunkDiv = document.createElement('div');
      chunkDiv.className = 'team-col-chunk';

      chunkItems.forEach((person, k) => {
        chunkDiv.appendChild(buildTeamRow(team, col, person, start + k, managerIndex, accent));
      });

      // Chỉ đặt nút "+" vào cột con này nếu nó chưa đủ 5 người (còn chỗ trống)
      if (c === numChunks - 1 && chunkItems.length < TEAM_CHUNK_SIZE) {
        chunkDiv.appendChild(buildTeamAddButton(team, col));
      }

      body.appendChild(chunkDiv);
    }

    // Nếu cột con cuối đã đủ 5 người, nhảy hẳn sang một cột con mới chỉ để chứa nút "+"
    if (list.length > 0 && list.length % TEAM_CHUNK_SIZE === 0) {
      const chunkDiv = document.createElement('div');
      chunkDiv.className = 'team-col-chunk';
      chunkDiv.appendChild(buildTeamAddButton(team, col));
      body.appendChild(chunkDiv);
    }

    colDiv.appendChild(body);
    table.appendChild(colDiv);
  });

  return table;
}

function drawBranchFromEl(connectorEl, parentEl, childEls) {
  if (!connectorEl || !parentEl || childEls.length === 0) return;
  if (!parentEl.querySelector('.card:not(.is-filtered-out)')) return;
  if (layoutOrientation === 'vertical') {
    drawVerticalBranchFromEl(connectorEl, parentEl, childEls);
    return;
  }
  const connectorRect = connectorEl.getBoundingClientRect();
  const width = Math.max(connectorRect.width, 1) / zoomLevel;
  const height = Math.max(connectorRect.height, 1) / zoomLevel;
  const midX = width / 2;

  const parentRect = parentEl.getBoundingClientRect();
  const parentCenterY = (parentRect.top + parentRect.height / 2 - connectorRect.top) / zoomLevel;

  const childPoints = childEls.map(el => {
    const r = el.getBoundingClientRect();
    return (r.top + r.height / 2 - connectorRect.top) / zoomLevel;
  });

  const stroke = '#c9c6ba';
  let svg = '<svg width="' + width + '" height="' + height + '" style="position:absolute;top:0;left:0;overflow:visible;">';
  svg += '<line x1="0" y1="' + parentCenterY + '" x2="' + midX + '" y2="' + parentCenterY + '" stroke="' + stroke + '" stroke-width="1.5"/>';

  const allY = childPoints.concat([parentCenterY]);
  const minY = Math.min(...allY);
  const maxY = Math.max(...allY);
  if (maxY > minY) {
    svg += '<line x1="' + midX + '" y1="' + minY + '" x2="' + midX + '" y2="' + maxY + '" stroke="' + stroke + '" stroke-width="1.5"/>';
  }
  childPoints.forEach(y => {
    svg += '<line x1="' + midX + '" y1="' + y + '" x2="' + width + '" y2="' + y + '" stroke="' + stroke + '" stroke-width="1.5"/>';
    svg += '<circle cx="' + width + '" cy="' + y + '" r="2.5" fill="' + stroke + '"/>';
  });
  svg += '</svg>';
  connectorEl.innerHTML = svg;
}

function drawVerticalBranchFromEl(connectorEl, parentEl, childEls) {
  const connectorRect = connectorEl.getBoundingClientRect();
  const width = Math.max(connectorRect.width, 1) / zoomLevel;
  const height = Math.max(connectorRect.height, 1) / zoomLevel;
  const midY = height / 2;
  const parentRect = parentEl.getBoundingClientRect();
  const parentCenterX = (parentRect.left + parentRect.width / 2 - connectorRect.left) / zoomLevel;
  const childPoints = childEls.map(el => {
    const r = el.getBoundingClientRect();
    return (r.left + r.width / 2 - connectorRect.left) / zoomLevel;
  });

  const stroke = '#c9c6ba';
  let svg = '<svg width="' + width + '" height="' + height + '" style="position:absolute;top:0;left:0;overflow:visible;">';
  svg += '<line x1="' + parentCenterX + '" y1="0" x2="' + parentCenterX + '" y2="' + midY + '" stroke="' + stroke + '" stroke-width="1.5"/>';

  const allX = childPoints.concat([parentCenterX]);
  const minX = Math.min(...allX);
  const maxX = Math.max(...allX);
  if (maxX > minX) {
    svg += '<line x1="' + minX + '" y1="' + midY + '" x2="' + maxX + '" y2="' + midY + '" stroke="' + stroke + '" stroke-width="1.5"/>';
  }
  childPoints.forEach(x => {
    svg += '<line x1="' + x + '" y1="' + midY + '" x2="' + x + '" y2="' + height + '" stroke="' + stroke + '" stroke-width="1.5"/>';
    svg += '<circle cx="' + x + '" cy="' + height + '" r="2.5" fill="' + stroke + '"/>';
  });
  svg += '</svg>';
  connectorEl.innerHTML = svg;
}

// ---- Zoom bằng cử chỉ chụm 2 ngón tay trên điện thoại/máy tính bảng ----
(function setupPinchZoom() {
  const viewport = document.querySelector('.viewport');
  if (!viewport) return;
  let pinchStartDist = null;
  let pinchStartZoom = 1;

  function touchDistance(touches) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }

  viewport.addEventListener('touchstart', (event) => {
    if (event.touches.length === 2) {
      pinchStartDist = touchDistance(event.touches);
      pinchStartZoom = zoomLevel;
    }
  }, { passive: true });

  viewport.addEventListener('touchmove', (event) => {
    if (event.touches.length === 2 && pinchStartDist) {
      event.preventDefault(); // chặn trình duyệt zoom cả trang, chỉ zoom sơ đồ
      const scale = touchDistance(event.touches) / pinchStartDist;
      zoomLevel = Math.max(0.4, Math.min(2, Math.round(pinchStartZoom * scale * 20) / 20));
      applyZoom();
    }
  }, { passive: false });

  function endPinch(event) {
    if (event.touches.length < 2 && pinchStartDist) {
      pinchStartDist = null;
      drawAllConnectors();
    }
  }
  viewport.addEventListener('touchend', endPinch);
  viewport.addEventListener('touchcancel', endPinch);
})();

// ---- Zoom bằng Ctrl/Cmd + cuộn chuột (hoặc chụm 2 ngón trên trackpad) trên máy tính, không cần ấn nút ----
(function setupWheelZoom() {
  const viewport = document.querySelector('.viewport');
  if (!viewport) return;
  let wheelZoomTimer = null;

  viewport.addEventListener('wheel', (event) => {
    // Chỉ zoom khi giữ Ctrl (Windows/Linux) hoặc Cmd (Mac), hoặc khi trình duyệt
    // báo đây là cử chỉ chụm trên trackpad (ctrlKey tự động = true trong trường hợp đó).
    if (!(event.ctrlKey || event.metaKey)) return;
    event.preventDefault(); // chặn trình duyệt zoom cả trang, chỉ zoom sơ đồ

    const step = event.deltaY < 0 ? 0.1 : -0.1;
    zoomLevel = Math.max(0.4, Math.min(2, Math.round((zoomLevel + step) * 10) / 10));
    applyZoom();

    clearTimeout(wheelZoomTimer);
    wheelZoomTimer = setTimeout(drawAllConnectors, 120);
  }, { passive: false });
})();

function formatHistoryTime(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleString('vi-VN', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit', year: 'numeric' });
  } catch (err) { return ''; }
}

async function openHistory() {
  const list = historyModal.querySelector('#history-list');
  historyModal.classList.add('is-open');

  if (!firebaseReady) {
    // Chế độ dự phòng: dùng danh sách lịch sử cục bộ đã có sẵn trong bộ nhớ
    renderHistoryList(editHistory);
    return;
  }

  list.innerHTML = '<li class="history-empty">Đang tải lịch sử...</li>';
  try {
    const snap = await historyColRef.orderBy('at', 'desc').limit(20).get();
    editHistory = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    renderHistoryList(editHistory);
  } catch (err) {
    list.innerHTML = '<li class="history-empty">Không tải được lịch sử: ' + err.message + '</li>';
  }
}

function renderHistoryList(entries) {
  const list = historyModal.querySelector('#history-list');
  if (!entries || entries.length === 0) {
    list.innerHTML = '<li class="history-empty">Chưa có lịch sử chỉnh sửa nào.</li>';
    return;
  }
  list.innerHTML = entries.map((entry, idx) =>
    '<li>' +
      '<div class="history-info">' +
        '<span class="history-name">' + (entry.name || 'Ẩn danh') + '</span>' +
        '<span class="history-action">' + (entry.action || 'Cập nhật sơ đồ') + '</span>' +
        '<span class="history-time">' + formatHistoryTime(entry.at) + '</span>' +
      '</div>' +
      (entry.state ?
        '<button type="button" class="history-restore-btn" data-idx="' + idx + '" ' + (editMode ? '' : 'disabled title="Bật chế độ chỉnh sửa để khôi phục"') + '>Khôi phục</button>'
        : '<span class="history-time">(không có bản lưu)</span>') +
    '</li>'
  ).join('');
  list.querySelectorAll('.history-restore-btn').forEach((btn) => {
    btn.onclick = () => restoreHistoryEntry(parseInt(btn.dataset.idx, 10));
  });
}
document.getElementById('btn-history').onclick = openHistory;

function restoreHistoryEntry(idx) {
  const entry = editHistory && editHistory[idx];
  if (!entry || !entry.state) return;
  if (!editMode) { setStatus('Cần bật chế độ chỉnh sửa để khôi phục.'); return; }
  const ok = confirm('Khôi phục sơ đồ về đúng phiên bản lúc ' + formatHistoryTime(entry.at) + ' (bởi ' + (entry.name || 'Ẩn danh') + ')? Thay đổi hiện tại sẽ được lưu thành một mốc lịch sử mới, không bị mất hẳn.');
  if (!ok) return;
  state = JSON.parse(JSON.stringify(entry.state));
  render();
  saveState({ action: 'Khôi phục về phiên bản lúc ' + formatHistoryTime(entry.at) });
  historyModal.classList.remove('is-open');
  setStatus('Đã khôi phục về phiên bản lúc ' + formatHistoryTime(entry.at) + '.');
}

    const compressed = await compressImageFile(file, 320, 'image/jpeg', 0.85);

    // hợp trong lúc người dùng đang chọn file, dữ liệu đã được đồng bộ mới từ đám mây về.
    const target = findPersonById(pendingAvatarTarget);
    if (!target) {
      alert('Không tìm thấy người này trong dữ liệu hiện tại (có thể dữ liệu vừa được cập nhật). Vui lòng thử bấm lại vào ảnh đại diện và chọn ảnh lần nữa.');
    } else {
      target.photo = compressed;
      render();
      saveState({ action: 'Đổi ảnh đại diện: ' + (target.name || '(trống)') });
    }
  } catch (err) {
    alert('Không xử lý được ảnh: ' + err.message);
  }
  pendingAvatarTarget = null;
  avatarFileInput.value = '';
};

function spreadsheetRow(level, person, dept = '', managerName = '') {
  ensurePersonProfile(person);
  return {
    'Cấp': level,
    'Phòng ban': dept,
    'Quản lý': managerName,
    'Tên': person.name || '',
    'Chức danh chi tiết': person.title || '',
    'Giới tính': person.gender || '',
    'Ngày sinh': person.dob || '',
    'Điện thoại': person.phone || '',
    'Email': person.email || '',
    'Địa chỉ': person.address || '',
    'Ngày vào làm': person.joinDate || '',
    'Trạng thái': person.status || '',
    'Số CCCD': person.cccd || '',
    'Số sổ BHXH': person.bhxh || '',
    'Lương': person.salary || '',
    'Ngân hàng - STK': person.bank || '',
    'Ghi chú': person.note || ''
  };
}

function exportExcel() {
  if (!window.XLSX) { alert('Chưa tải được thư viện Excel. Hãy kiểm tra kết nối mạng rồi thử lại.'); return; }
  const rows = [];
  FLAT_TIERS_TOP.forEach((tier) => state[tier.id].forEach((person) => rows.push(spreadsheetRow(tier.title, person))));
  state.t4.forEach((manager) => {
    rows.push(spreadsheetRow(T4.title, manager, manager.dept || ''));
    const managerName = manager.name || '';
    TEAM_COLS.forEach((col) => (manager.team?.[col.key] || []).forEach((person) => {
      rows.push(spreadsheetRow(col.title, person, manager.dept || '', managerName));
    }));
  });
  const sheet = XLSX.utils.json_to_sheet(rows);
  sheet['!cols'] = [{ wch: 20 }, { wch: 22 }, { wch: 22 }, { wch: 24 }, { wch: 28 }, { wch: 10 }, { wch: 14 }, { wch: 16 }, { wch: 28 }, { wch: 32 }, { wch: 14 }, { wch: 14 }, { wch: 16 }, { wch: 16 }, { wch: 14 }, { wch: 24 }, { wch: 36 }];
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, sheet, 'Sơ đồ nhân sự');
  XLSX.writeFile(workbook, 'so-do-phan-cap.xlsx');
}

function personFromSpreadsheetRow(row) {
  return {
    name: String(row['Tên'] || '').trim(), photo: null,
    title: String(row['Chức danh chi tiết'] || '').trim(),
    gender: String(row['Giới tính'] || '').trim(),
    dob: String(row['Ngày sinh'] || '').trim(),
    phone: String(row['Điện thoại'] || '').trim(),
    email: String(row['Email'] || '').trim(),
    address: String(row['Địa chỉ'] || '').trim(),
    joinDate: String(row['Ngày vào làm'] || '').trim(),
    status: String(row['Trạng thái'] || '').trim() || 'Đang làm',
    cccd: String(row['Số CCCD'] || '').trim(),
    bhxh: String(row['Số sổ BHXH'] || '').trim(),
    salary: String(row['Lương'] || '').trim(),
    bank: String(row['Ngân hàng - STK'] || '').trim(),
    note: String(row['Ghi chú'] || '').trim(),
    degreeFiles: []
  };
}

function importExcelRows(rows) {
  const imported = defaultState();
  FLAT_TIERS_TOP.forEach((tier) => { imported[tier.id] = []; });
  imported.t4 = [];
  const managerMap = new Map();
  const getManager = (dept, managerName) => {
    const key = (dept + '|' + managerName).toLocaleLowerCase('vi-VN');
    if (!managerMap.has(key)) {
      const manager = { ...emptyPerson(), name: managerName, dept, team: { t6: [], t7: [] } };
      managerMap.set(key, manager);
      imported.t4.push(manager);
    }
    return managerMap.get(key);
  };

  rows.forEach((row) => {
    const level = String(row['Cấp'] || '').trim();
    const person = personFromSpreadsheetRow(row);
    const dept = String(row['Phòng ban'] || '').trim();
    const managerName = String(row['Quản lý'] || '').trim();
    const tier = FLAT_TIERS_TOP.find((item) => item.title.toLocaleLowerCase('vi-VN') === level.toLocaleLowerCase('vi-VN'));
    if (tier) { imported[tier.id].push(person); return; }
    if (level === T4.title) {
      const key = (dept + '|' + person.name).toLocaleLowerCase('vi-VN');
      const existingManager = managerMap.get(key);
      if (existingManager) {
        Object.assign(existingManager, person, { dept });
      } else {
        const manager = { ...person, dept, team: { t6: [], t7: [] } };
        managerMap.set(key, manager);
        imported.t4.push(manager);
      }
      return;
    }
    const teamCol = TEAM_COLS.find((item) => item.title.toLocaleLowerCase('vi-VN') === level.toLocaleLowerCase('vi-VN'));
    if (teamCol) getManager(dept, managerName).team[teamCol.key].push(person);
  });

  FLAT_TIERS_TOP.forEach((tier) => { if (imported[tier.id].length === 0) imported[tier.id].push(emptyPerson()); });
  if (imported.t4.length === 0) imported.t4.push(emptyTrungCap());
  imported.t4.forEach((manager) => {
    TEAM_COLS.forEach((col) => { if (!manager.team[col.key].length) manager.team[col.key].push(emptyPerson()); });
  });
  state = imported;
  render();
  saveState({ action: 'Nhập dữ liệu từ tệp Excel' });
  setStatus('Đã nhập dữ liệu từ Excel. Ảnh đại diện không có trong tệp Excel nên cần thêm lại nếu cần.');
}

document.getElementById('btn-export-xlsx').onclick = guardEdit(exportExcel);

document.getElementById('file-input-xlsx').onchange = (event) => {
  if (!editMode) { event.target.value = ''; return; }
  const file = event.target.files[0];

  const reader = new FileReader();
  reader.onload = () => {
    try {
      if (!window.XLSX) throw new Error('Không tải được thư viện Excel');
      const workbook = XLSX.read(reader.result, { type: 'array' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      importExcelRows(XLSX.utils.sheet_to_json(sheet, { defval: '' }));
    } catch (err) {
      alert('Không đọc được tệp Excel. Hãy dùng tệp được xuất từ sơ đồ này hoặc kiểm tra lại cột dữ liệu.');
    }
  };
  reader.readAsArrayBuffer(file);
  event.target.value = '';
};

// Tự động mở khóa chỉnh sửa nếu mở bằng "Link chỉnh sửa" (dạng #edit=mật_khẩu)
async function tryAutoUnlockFromLink() {
  const match = window.location.hash.match(/(?:^#|&)edit=([^&]+)/);
  if (!match) return;
  const pass = decodeURIComponent(match[1]);
  // Xóa ngay khỏi thanh địa chỉ để không lộ mật khẩu khi chụp màn hình / chia sẻ lại
  history.replaceState(null, '', window.location.pathname + window.location.search);
  const ok = await checkEditPassword(pass);
  if (ok) activateEditMode('link');
  else setStatus('Link chỉnh sửa không hợp lệ hoặc đã hết hạn.');
}

/* ===== Dịch sang tiếng Anh (Google Translate) ===== */
(function () {
  const COOKIE_NAME = 'googtrans';
  const LANG_PAIR = '/vi/en';

  function readGoogTransCookie() {
    const match = document.cookie.match(/(?:^|;\s*)googtrans=([^;]*)/);
    return match ? decodeURIComponent(match[1]) : '';
  }
  function setGoogTransCookie(value) {
    const base = 'path=/;max-age=31536000';
    document.cookie = COOKIE_NAME + '=' + encodeURIComponent(value) + ';' + base;
    document.cookie = COOKIE_NAME + '=' + encodeURIComponent(value) + ';' + base + ';domain=' + location.hostname;
  }
  function clearGoogTransCookie() {
    const expired = 'path=/;expires=Thu, 01 Jan 1970 00:00:00 UTC';
    document.cookie = COOKIE_NAME + '=;' + expired;
    document.cookie = COOKIE_NAME + '=;' + expired + ';domain=' + location.hostname;
  }

  function updateTranslateButton() {
    const btn = document.getElementById('btn-translate-en');
    if (!btn) return;
    const isEnglish = readGoogTransCookie() === LANG_PAIR;
    btn.textContent = isEnglish ? '🌐 Tiếng Việt' : '🌐 English';
    btn.title = isEnglish ? 'Quay lại tiếng Việt' : 'Dịch toàn bộ sơ đồ sang tiếng Anh (dùng Google Dịch)';
    btn.classList.toggle('is-active', isEnglish);
  }

  window.googleTranslateElementInit = function () {
    new google.translate.TranslateElement(
      { pageLanguage: 'vi', includedLanguages: 'en', autoDisplay: false },
      'google_translate_element'
    );
  };

  function ensureTranslateScriptLoaded() {
    if (document.getElementById('google-translate-script')) return;
    const script = document.createElement('script');
    script.id = 'google-translate-script';
    script.src = 'https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
    script.onerror = function () {
      alert('Không tải được Google Dịch. Hãy kiểm tra kết nối mạng rồi thử lại.');
    };
    document.body.appendChild(script);
  }

  const hiddenHost = document.createElement('div');
  hiddenHost.id = 'google_translate_element';
  document.body.appendChild(hiddenHost);

  document.getElementById('btn-translate-en').onclick = function () {
    if (readGoogTransCookie() === LANG_PAIR) {
      clearGoogTransCookie();
    } else {
      setGoogTransCookie(LANG_PAIR);
      ensureTranslateScriptLoaded();
    }
    location.reload();
  };

  if (readGoogTransCookie() === LANG_PAIR) {
    ensureTranslateScriptLoaded();
  }
  updateTranslateButton();
})();
</script>
